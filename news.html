<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEWS</title>

<style>
body{
  margin:0;
  padding-top:140px;
  font-family:'Oswald', sans-serif;
  background:#02142c;
  color:white;
}

/* ===== タイトル ===== */
h1{
  margin:15px 0 20px 80px;
  font-size:64px;
  font-weight:bold;
  color:white;
  letter-spacing:2px;
}

@media (max-width:1024px){

  h1{
    margin:10px 0 20px 20px;
    font-size:50px;
  }

}

/* ===== 一覧 ===== */
.news-list{
max-width:900px;
margin:50px auto;
padding:0 15px;
}

/* 各記事 */
.news-item{
  display:flex;
  align-items:center;
  gap:20px;

  padding:20px;
  margin-bottom:20px;

  border-radius:15px;
  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.1);

  transition:0.4s;
}


/* 日付 */
.news-item .date{
color:#aaa;
font-size:14px;
}

/* タイトル */
.news-item .title{
font-size:20px;
font-weight:700;
}

@media (max-width:600px){

  .news-item .title{
    font-size:16px;
  }

}

/* hover */
.news-item:hover{
background:rgba(214,0,42,0.2);
transform:translateX(10px);
}

/* リンク */
.news-link{
text-decoration:none;
color:white;
display:block;
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:2px 0;
  background:#000;
  border-bottom:2px solid #d6002a;
  box-shadow:0 5px 20px rgba(0,0,0,0.8);
  z-index:3000;
}

@keyframes shine{
0% { left:-100%; }
50% { left:120%; }
100% { left:120%; }
}


.title img{
  height:80px;
  width:auto;
}

/* ナビ */
.nav{
  display:flex;
  gap:40px;
  margin-top:2px;
  background:rgba(0,0,0,0.3);

  padding:4px 20px;

  max-width:1200px;
  margin-left:auto;
  margin-right:auto;

  box-sizing:border-box;
  overflow-x:auto;
  flex-wrap:nowrap;
  justify-content:flex-start;
}


.nav::-webkit-scrollbar{
  display:none;
}

.nav a{
  color:white;
  text-decoration:none;
  font-size:22px;
  font-weight:500;
  letter-spacing:3px;
  position:relative;
  transition:0.3s;
  display:inline-block;
  padding:4px 15px;
  border-radius:5px;
  white-space:nowrap;
  font-size:clamp(14px, 2vw, 22px);
}

.nav a::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:50%;
  width:0;
  height:2px;
  background:#d6002a;
  transition:0.3s;
  transform:translateX(-50%);
}

.nav a:hover{
  color:#d6002a;
  background:rgba(214,0,42,0.2);
  transform:translateY(-2px);
}

.nav a:hover::after{
  width:100%;
}

.nav a.active{
  color:#d6002a;
  background:rgba(214,0,42,0.2);
}

.nav a.active::after{
  width:100%;
}

.title{
  position:relative;
  width:100%;
  height:120px;            /* ✅ 高さを固定（これが一番重要） */
  display:flex;
  justify-content:center;
  align-items:center;      /* ✅ 中央揃え */
  background:linear-gradient(
    to bottom,
    #02142c,
    #062452,
    #02142c
  );
  border-bottom:3px solid #d6002a;
  box-shadow:0 5px 20px rgba(0,0,0,0.6);
  overflow:hidden;
}


.title img{
  height:80px;       /* ✅ 固定 */
  width:auto;        /* ✅ 縦優先にする */
}

.menu-btn span{
transition:0.3s;
}

.title::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  animation: shine 3s infinite;
}

.title::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:80px;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0),
    rgba(0,0,0,0.8)
  );
}

header.small{
  padding:5px 0;
}

header.small .title{
  height:60px;
}

header.small .title img{
  height:40px;
}

footer{
  text-align:center;
  padding:30px 0;
  background:#000;
  border-top:2px solid #d6002a;
  margin-top:80px;
}

.footer-sns a{
  color:#ccc;
  margin:0 10px;
  text-decoration:none;
}

.footer-sns a:hover{
  color:#fff;
}

.insta{
  background:linear-gradient(45deg,#feda75,#d62976,#962fbf);
}

.youtube{
  background:#ff0000;
}

.x{
  background:#000;
}

.threads{
  background:#111;
}

.footer-sns a{
  padding:5px 10px;
  border-radius:5px;
  margin:0 10px;
  color:#ccc;
  display:inline-block;
  transition:0.3s;
}

.footer-sns a:hover{
  color:#fff;
  background:rgba(214,0,42,0.3);
  transform:translateY(-2px);
}

.menu-btn{
  display:none;
  flex-direction:column;
  cursor:pointer;
  gap:5px;
  z-index:2000;
  position:absolute;
  right:20px;
  top:20px;
}

.menu-btn span{
  width:25px;
  height:3px;
  background:white;
  display:block;
  transition:0.3s;
}

@media (max-width:1024px){

  .menu-btn{
    display:flex;
    position:absolute;
    right:20px;
    top:20px;
    position:absolute;
    z-index:1000;
  }

  .nav{
    display:flex;
    flex-direction:row;
    flex-wrap:nowrap;
    overflow-x:visible;
    gap:10px;
    width:100%;
    justify-content:center;
    white-space:nowrap;
    padding:2px 5px;
    text-align:center;
  }

  .nav a{
    padding:2px 2px;
    font-size:11px;
    letter-spacing:0;
    border-top:1px solid #333;
  }

  .nav::-webkit-scrollbar{
    display:none;
  }

  .nav.open{
  display:flex;
  flex-direction:column;

  position:absolute;
  top:80px;
  left:0;

  width:100%;

  background:#000;

  z-index:5000;
}

  .nav.open a{
    padding:15px;
    border-top:1px solid #333;
    width:100%;
    box-sizing:border-box;
  }

  .title{
    height:80px;
  }

  .title img{
    height:50px;
  }

}



.menu-btn span{
  transition:0.3s;
  transform-origin: center;
}

/* 1本目 */
.menu-btn.active span:nth-child(1){
  transform: rotate(45deg) translate(5px, 5px);
}

/* 2本目 */
.menu-btn.active span:nth-child(2){
  opacity:0;
}

/* 3本目 */
.menu-btn.active span:nth-child(3){
  transform: rotate(-45deg) translate(5px, -5px);
}

.overlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.6);
  opacity:0;
  pointer-events:none;
  transition:0.3s;

  z-index:999;
}

.overlay.active{
  opacity:1;
  pointer-events:auto;
}



@media (max-width:1024px){
  body{
    padding-top:110px;
  }
}

@media (min-width:1025px){

  .nav{
    display:flex;
    flex-direction:row;
    max-height:none;
    overflow:visible;
  }

}
/* スマホ・半画面だけ調整 */
@media (max-width:1024px){

  h1{
    margin-top:0;
    margin-left:20px;
    font-size:50px;
  }

}

</style>

</head>

<body>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

window.db = db;
window.getDocs = getDocs;
window.collection = collection;

window.startNews = function(){
  loadNews();
};

window.addEventListener("load", () => {

  const timer = setInterval(() => {

    if(window.db && window.getDocs){

      clearInterval(timer);

      loadNews();

    }

  },100);

});
</script>

<!-- ✅ ヘッダー追加 -->
<header>
  <div class="title">
    <img src="title.gif">
  </div>

  <div class="menu-btn">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <nav class="nav">
  <a href="index.html">HOME</a>
  <a href="index.html#news-feature" class="active">NEWS</a>
  <a href="schedule.html">スケジュール</a>
  <a href="member.html">選手・スタッフ</a>
  <a href="index.html#recruit">RECRUIT</a>
    <a href="#" onclick="goMember()">部員専用</a>
   </nav>
</header>

<div class="overlay"></div>


<h1>NEWS</h1>

  <div class="news-list" id="news-list"></div>

<footer>

  <p>© NARA Ambitions Club</p>
<div class="footer-sns">
  <a href="https://www.instagram.com/nara_ambitions" target="_blank" rel="noopener noreferrer" class="insta">Instagram</a>
  <a href="https://www.youtube.com/@AMBTV-nara1996" target="_blank" rel="noopener noreferrer" class="youtube">YouTube</a>
  <a href="https://twitter.com/ClubNara" target="_blank" rel="noopener noreferrer" class="x">X</a>
  <a href="https://www.threads.net/@nara_ambitions" target="_blank" rel="noopener noreferrer" class="threads">Threads</a>
</div>
</footer>

<script>

let newsData = [];

// ✅ Firebaseから取得
async function loadNews(){

  const snap = await window.getDocs(
  window.collection(window.db, "news")
);

  newsData = [];

  snap.forEach(docSnap => {
    newsData.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

console.log(newsData);
  renderNews();
}


// ✅ 一覧表示
function renderNews(){

  const approvedNews = newsData.filter(n => n.approved === true);

  const box = document.getElementById("news-list");

  box.innerHTML = "";

  approvedNews.sort((a,b) => new Date(b.date) - new Date(a.date));

console.log(approvedNews);

  approvedNews.forEach((n, i) => {

    box.innerHTML += `
      <div onclick="openModal(${i})" class="news-link">

        <div class="news-item">
          <div style="display:flex;align-items:center;gap:15px;">

            ${n.img ? `
  <img src="${n.img}" style="width:100px;height:70px;object-fit:cover;">
` : ""}

            <div>
              <div class="date">${n.date}</div>
              <div class="title">${n.title}</div>
            </div>

          </div>
        </div>

      </div>
    `;
  });
}


// ✅ モーダル表示
function openModal(i){

  const approvedNews = newsData.filter(n => n.approved === true);
  const n = approvedNews[i];

  const box = document.getElementById("modalContent");

  box.innerHTML = `
  <h3>${n.title}</h3>
  <p style="color:#aaa;">${n.date}</p>

  ${n.img ? `<img src="${n.img}" style="width:100%;margin:10px 0;">` : ""}

  <p>${n.content || ""}</p>

  <br>

  <button onclick="closeModal()" style="
    width:100%;
    background:#666;
    color:white;
    padding:10px;
    border:none;
  ">
    閉じる
  </button>
`;

  document.getElementById("modal").style.display = "flex";
}


// ✅ モーダル閉じる
function closeModal(){
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(e){
  const modal = document.getElementById("modal");
  if(e.target === modal){
    modal.style.display = "none";
  }
}


// ✅ 初期表示
loadNews();

</script>

<div id="modal" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
">

  <div id="modalContent" style="
    background:#0a1f3f;
    padding:30px;
    max-width:800px;
    width:95%;
    border-radius:15px;
    text-align:left;
  ">
  </div>

</div>

<script>

const menuBtn = document.querySelector(".menu-btn");
const nav = document.querySelector(".nav");
const overlay = document.querySelector(".overlay");

const header = document.querySelector("header");

window.addEventListener("scroll", () => {

  if(window.scrollY > 100){
    header.classList.add("small");
  }else{
    header.classList.remove("small");
  }

});

// 開閉
menuBtn.addEventListener("click", () => {

  menuBtn.classList.toggle("active");
  nav.classList.toggle("open");

  if(nav.classList.contains("open")){

    document.body.style.overflow = "hidden";
    overlay.classList.add("active");

  }else{

    document.body.style.overflow = "auto";
    overlay.classList.remove("active");

  }

});



// ナビ押したら閉じる
document.querySelectorAll(".nav a").forEach(link => {

  link.addEventListener("click", () => {

    nav.classList.remove("open");
    menuBtn.classList.remove("active");

    overlay.classList.remove("active");

    document.body.style.overflow = "auto";

  });

});

// 外側クリック
overlay.addEventListener("click", () => {

  nav.classList.remove("open");
  menuBtn.classList.remove("active");

  overlay.classList.remove("active");

  document.body.style.overflow = "auto";

});

// PCに戻った時
window.addEventListener("resize", () => {

  if(window.innerWidth > 1024){

    nav.classList.remove("open");
    menuBtn.classList.remove("active");

    overlay.classList.remove("active");

    document.body.style.overflow = "auto";
  }

});

function goMember(){

  const saved = localStorage.getItem("userLogin");

  if(saved){

    const user = JSON.parse(saved);

    if(Date.now() < user.expire){
      location.href = "member-only.html";
      return;
    }
  }

  const id = prompt("IDを入力してください");
  const pass = prompt("パスワードを入力してください");

  if(
    (id === "admin" && pass === "0725") ||
    (id === "nakano" && pass === "1996")
  ){

    const data = {
      id,
      expire: Date.now() + (30 * 60 * 1000)
    };

    localStorage.setItem(
      "userLogin",
      JSON.stringify(data)
    );

    alert("ログイン成功");
    location.href = "member-only.html";

  }else{

    alert("IDまたはパスワードが違います");

  }
}


window.addEventListener("scroll", () => {

  if(window.scrollY > 100){
    header.classList.add("small");
  }else{
    header.classList.remove("small");
  }

});


</script>


</body>
</html>
