<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>NEWS</title>

<style>
body{
margin:0;
font-family:'Oswald', sans-serif;
background:#02142c;
color:white;
}

/* ===== タイトル ===== */
h1{
text-align:center;
margin-top:200px;
font-size:40px;
letter-spacing:4px;
color:#d6002a;
}

/* ===== 一覧 ===== */
.news-list{
max-width:900px;
margin:50px auto;
}

/* 各記事 */
.news-item{
  display:flex;
  align-items:center;
  gap:20px;

  padding:20px;
  margin-bottom:20px;

  border-radius:15px;
  background:rgba(255,255,255,0.05);

  border:1px solid rgba(255,255,255,0.1);

  transition:0.4s;
}


/* 日付 */
.news-item .date{
color:#aaa;
font-size:14px;
}

/* タイトル */
.news-item .title{
font-size:20px;
font-weight:700;
}

/* hover */
.news-item:hover{
background:rgba(214,0,42,0.2);
transform:translateX(10px);
}

/* リンク */
.news-link{
text-decoration:none;
color:white;
display:block;
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  display:flex;
  flex-direction:column;
  align-items:center;
  padding:12px 0;
  background:#000;
  border-bottom:2px solid #d6002a;
  box-shadow:0 5px 20px rgba(0,0,0,0.8);
  z-index:999;
}

/* ロゴ */
.title{
position:relative;
width:100%;
display:flex;
justify-content:center;
cursor:pointer;
background:linear-gradient(
to bottom,
#02142c,
#062452,
#02142c
);
border-bottom:3px solid #d6002a;
box-shadow: 0 5px 20px rgba(0,0,0,0.6);
overflow:hidden;
}

.title::before{
content:"";
position:absolute;
top:0;
left:-100%;
width:60%;
height:100%;
background:linear-gradient(
120deg,
transparent,
rgba(255,255,255,0.6),
transparent
);
animation: shine 3s infinite;
}

@keyframes shine{
0% { left:-100%; }
50% { left:120%; }
100% { left:120%; }
}


.title img{
  width:80%;
  max-width:600px;
}

/* ナビ */
.nav{
  display:flex;
  gap:30px;
}

.nav a{
color:white;
text-decoration:none;
font-size:22px;
font-weight:500;
letter-spacing:3px;
position:relative;
transition:0.3s;
padding:8px 15px;
border-radius:5px;
}

.nav a::after{
content:"";
position:absolute;
bottom:-5px;
left:50%;
width:0;
height:2px;
background:#d6002a;
transition:0.3s;
transform:translateX(-50%);
}

.nav a:hover{
color:#d6002a;
background:rgba(214,0,42,0.2);
transform:translateY(-2px);
}

.nav a:hover::after{
width:100%;
}

.nav a.active{
color:#d6002a;
background:rgba(214,0,42,0.2);
}

.nav a.active::after{
width:100%;
}


footer{
  text-align:center;
  padding:30px 0;
  background:#000;
  border-top:2px solid #d6002a;
  margin-top:80px;
}

.footer-sns a{
  color:#ccc;
  margin:0 10px;
  text-decoration:none;
}

.footer-sns a:hover{
  color:#fff;
}

.insta{
  background:linear-gradient(45deg,#feda75,#d62976,#962fbf);
}

.youtube{
  background:#ff0000;
}

.x{
  background:#000;
}

.threads{
  background:#111;
}

.footer-sns a{
  padding:5px 10px;
  border-radius:5px;
  margin:0 10px;
  color:#ccc;
  display:inline-block;
  transition:0.3s;
}

.footer-sns a:hover{
  color:#fff;
  background:rgba(214,0,42,0.3);
  transform:translateY(-2px);
}

</style>

</head>

<body>

<!-- ✅ ヘッダー追加 -->
<header>
  <div class="title">
    <img src="title.gif" alt="NARA AMBITIONS CLUB">
  </div>

  <div class="menu-btn">
    <span></span>
    <span></span>
    <span></span>
  </div>

  <nav class="nav">
    <a href="index.html">HOME</a>
    <a href="index.html#news-feature" class="active">NEWS</a>
    <a href="member.html">選手・スタッフ</a>
    <a href="schedule.html">スケジュール</a>
    <a href="index.html#sns">SNS</a>
    <a href="index.html#member">部員専用</a>
  </nav>
</header>

<h1>NEWS</h1>

  <div class="news-list" id="news-list"></div>

<footer>

  <p>© NARA Ambitions Club</p>
<div class="footer-sns">
  <a href="https://www.instagram.com/nara_ambitions" target="_blank" rel="noopener noreferrer" class="insta">Instagram</a>
  <a href="https://www.youtube.com/@AMBTV-nara1996" target="_blank" rel="noopener noreferrer" class="youtube">YouTube</a>
  <a href="https://twitter.com/ClubNara" target="_blank" rel="noopener noreferrer" class="x">X</a>
  <a href="https://www.threads.net/@nara_ambitions" target="_blank" rel="noopener noreferrer" class="threads">Threads</a>
</div>
</footer>

<script>
function renderNews(){
  const news = JSON.parse(localStorage.getItem("news")) || [];

// ✅ 承認済みだけにする
const approvedNews = news.filter(n => n.approved === true);

const box = document.getElementById("news-list");

box.innerHTML = "";

// ✅ 日付順
approvedNews.sort((a,b) => new Date(b.date) - new Date(a.date));

  approvedNews.forEach((n, i) => {
  box.innerHTML += `
    <div onclick="openModal(${i})" class="news-link">

      <div class="news-item">
        <div style="display:flex;align-items:center;gap:15px;">

          ${n.img ? `
            <img src="${n.img}" style="width:100px;height:70px;object-fit:cover;">
          ` : ""}

          <div>
            <div class="date">${n.date}</div>
            <div class="title">${n.title}</div>
          </div>

        </div>
      </div>

    </div> <!-- ←これ追加（超重要） -->
  `;
});
}


const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(id !== null){

  const news = JSON.parse(localStorage.getItem("news")) || [];

// ✅ 承認済みだけ
const approvedNews = news.filter(n => n.approved === true);

const n = approvedNews[id];

  const box = document.getElementById("news-list");

  box.innerHTML = `
    <h2>${n.title}</h2>
    <p style="color:#aaa;">${n.date}</p>

    ${n.img ? `<img src="${n.img}" style="width:100%;margin:20px 0;">` : ""}

    <p>${n.content || ""}</p>
  `;

}else{
  renderNews();   // ← 元の一覧表示
}


function openModal(i){
  const news = JSON.parse(localStorage.getItem("news")) || [];

  // ✅ 承認済みだけ
  const approvedNews = news.filter(n => n.approved === true);

  const n = approvedNews[i];

  const box = document.getElementById("modalContent");

  box.innerHTML = `
    <h3>${n.title}</h3>
    <p style="color:#aaa;">${n.date}</p>

    ${n.img ? `<img src="${n.img}" style="width:100%;margin:10px 0;">` : ""}

    <p>${n.content || ""}</p>

    <br>

    <button onclick="closeModal()" style="
      width:100%;
      background:#666;
      color:white;
      padding:10px;
      border:none;
    ">
      閉じる
    </button>
  `;

  document.getElementById("modal").style.display = "flex";
}

function closeModal(){
  document.getElementById("modal").style.display = "none";
}

window.onclick = function(e){
  const modal = document.getElementById("modal");
  if(e.target === modal){
    modal.style.display = "none";
  }
}

</script>

<div id="modal" style="
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.7);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:2000;
">

  <div id="modalContent" style="
    background:#0a1f3f;
    padding:30px;
    max-width:800px;
    width:95%;
    border-radius:15px;
    text-align:left;
  ">
  </div>

</div>


</body>
</html>
