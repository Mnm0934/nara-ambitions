<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>試合結果詳細</title>

<style>
body{
  background:#02142c;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

table{
  border-collapse:collapse;
  margin:10px auto;
  font-size:13px;
  table-layout:auto;  /* ← 追加 */
}

@media (max-width:600px){
  table{
    font-size:10px;
  }

  td,th{
    padding:4px;
  }

  td:first-child,
  th:first-child{
    min-width:100px;
    padding-left:6px;
  }
}

@media (max-width:600px){
  button{
    width:90%;
    display:block;
    margin:10px auto;
  }
}

td,th{
  border:1px solid #333;
  padding:5px;
  width:50px;      /* ← 追加 */
  text-align:center;
}

.header{
  background:#d6002a;
  color:white;
}

.green{
  background:#02142c;
  color:white;
}

.title{
  font-size:32px;
  font-weight:bold;
  color:#d6002a;
  margin:20px 0;
  text-shadow:0 0 15px currentColor;

  white-space:pre-line;
}

td:first-child,
th:first-child{

  min-width:120px;
  width:auto;

  text-align:left;
  white-space:nowrap;
  padding-left:10px;

  position:sticky;
  left:0;

  z-index:2;

  background:#02142c;

  box-shadow:3px 0 8px rgba(0,0,0,.3);

  border-right:2px solid #d6002a;
}

th:first-child{
  background:#d6002a;
  z-index:3;
}


button{
  margin:10px;
  padding:12px 24px;

  border:none;
  border-radius:30px;

  background:#d6002a;
  color:white;

  font-weight:bold;
  font-size:16px;

  cursor:pointer;

  box-shadow:
    0 5px 15px rgba(0,0,0,.4);
}

#info{
  max-width:700px;

  margin:20px auto;
  padding:20px;

  background:white;
  color:black;

  border-radius:15px;

  box-shadow:
    0 10px 30px rgba(0,0,0,.4);
}

#mvp{
  max-width:500px;
  margin:20px auto;
  padding:20px;

  background:#ffd700;
  color:black;

  border-radius:15px;

  font-size:18px;
  font-weight:bold;
}

#summary{
  max-width:700px;
  margin:20px auto;
  padding:20px;

  background:white;
  color:black;

  border-radius:15px;
}

#teamTotal{
  max-width:700px;
  margin:20px auto;
  padding:20px;

  background:#0a2a4a;

  border-radius:15px;
}


h3{
  color:#fff;
  font-size:28px;

  margin-top:40px;
  margin-bottom:20px;

  position:relative;
}

h3::after{
  content:"";
  display:block;

  width:120px;
  height:4px;

  background:#d6002a;

  margin:10px auto 0;
}

</style>
</head>
<body style="display:none;">

<script>
const saved = localStorage.getItem("userLogin");

if(saved){
  const user = JSON.parse(saved);

  if(Date.now() < user.expire){
    document.body.style.display = "block";
  }else{
    alert("ログイン期限切れ");
    localStorage.removeItem("userLogin");
    location.href = "index.html";
  }

}else{
  alert("ログインしてください");
  location.href = "index.html";
}
</script>

<div class="title">試合結果詳細</div>

<button onclick="goList()">試合一覧へ戻る</button>

<div id="info"></div>

<h3>📊 スコアボード</h3>

<div style="overflow-x:auto; -webkit-overflow-scrolling:touch;">
  <div id="score"></div>
</div>

<div id="mvp"></div>

<div id="summary"></div>

<div id="teamTotal"></div>


<h3>打撃成績</h3>
<div style="overflow-x:auto; -webkit-overflow-scrolling: touch;">
  <div id="bat"></div>
</div>

<h3>投手成績</h3>
<div style="overflow-x:auto; -webkit-overflow-scrolling: touch;">
  <div id="pitch"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

// ✅ 試合取得

const params = new URLSearchParams(location.search);
const id = params.get("id");

let match = null;

async function loadGame(){

  if(!id){
    alert("試合IDがありません");
    location.href = "game_list.html";
    return;
  }

  const ref = doc(db, "results", id);

  try {

    const snap = await getDoc(ref);

    if(!snap.exists()){
      alert("データが見つかりません");
      location.href = "game_list.html";
      return;
    }

    match = snap.data();
    renderAll();

  }catch(e){
    alert("通信エラーが発生しました");
    location.href = "game_list.html";
  }
}

	
							
function renderAll(){

  // ✅ ここに追加
  const myTotal = (match.myInnings || []).reduce((a,b)=>a+(b||0),0);
const opponentTotal = (match.opInnings || []).reduce((a,b)=>a+(b||0),0);

let result = "";
if(myTotal > opponentTotal) result = "勝ち";
else if(myTotal < opponentTotal) result = "負け";
else result = "引分";

const title = document.querySelector(".title");

if(result === "勝ち"){

  title.innerText =
    `🟢 WIN\nAmbitions ${myTotal}-${opponentTotal} ${match.opponent}`;

  title.style.color = "#00ff66";

}
else if(result === "負け"){

  title.innerText =
    `🔴 LOSE\nAmbitions ${myTotal}-${opponentTotal} ${match.opponent}`;

  title.style.color = "#ff4444";

}
else{

  title.innerText =
    `⚪ DRAW\nAmbitions ${myTotal}-${opponentTotal} ${match.opponent}`;

  title.style.color = "#ffffff";

}

  // ✅ 基本情報
  document.getElementById("info").innerHTML = `
  <b>${match.date}</b><br>
  ${match.game}<br>
  vs ${match.opponent}
`;

let mvp = null;
let maxPoint = -1;

(match.batters || []).forEach(p=>{

  const point =
  (p.hit || 0)
  + (p.rbi || 0) * 2
  + (p.hr || 0) * 4
  + (p.run || 0)
  + (p.sb || 0);

  if(point > maxPoint){
    maxPoint = point;
    mvp = p;
  }

});

if(mvp){

  document.getElementById("mvp").innerHTML = `
  <div style="font-size:24px;margin-bottom:10px;">
    🏆 MVP
  </div>

  ${mvp.name}<br>
  ${mvp.ab || 0}打数 ${mvp.hit || 0}安打<br>
  ${mvp.hr || 0}本塁打 ${mvp.rbi || 0}打点<br>
  OPS ${calcOPS(mvp)}
`;

}

const teamHits =
  (match.batters || [])
  .reduce((a,b)=>a+(b.hit||0),0);

const teamRbi =
  (match.batters || [])
  .reduce((a,b)=>a+(b.rbi||0),0);

const strikeouts =
  (match.pitchers || [])
  .reduce((a,b)=>a+(b.k||0),0);

document.getElementById("summary").innerHTML = `
<h3 style="color:black;margin-top:0;">
📝 試合サマリー
</h3>

結果：${result}<br><br>

対戦相手：${match.opponent}<br>

チーム安打：${teamHits}<br>
チーム打点：${teamRbi}<br>
投手陣奪三振：${strikeouts}<br>

MVP：${mvp ? mvp.name : "-"}
`;

let teamPA = 0;
let teamAB = 0;
let teamH = 0;
let teamBB = 0;
let teamR = 0;
let teamRBI = 0;
let teamSB = 0;

(match.batters || []).forEach(p=>{

  teamPA += p.pa || 0;
  teamAB += p.ab || 0;
  teamH += p.hit || 0;
  teamBB += p.bb || 0;
  teamR += p.run || 0;
  teamRBI += p.rbi || 0;
  teamSB += p.sb || 0;

});

const teamAVG =
  teamAB
  ? (teamH / teamAB).toFixed(3)
  : ".000";

document.getElementById("teamTotal").innerHTML = `
<h3 style="margin-top:0;color:white;">
📊 チーム合計成績
</h3>

打席：${teamPA}<br>
打数：${teamAB}<br>
安打：${teamH}<br>
四死球：${teamBB}<br>
得点：${teamR}<br>
打点：${teamRBI}<br>
盗塁：${teamSB}<br>
打率：${teamAVG}
`;

// ================= スコア =================

let innings = match.myInnings || [];
let opInnings = match.opInnings || [];

let topName, topData, bottomName, bottomData;

if(match.batFirst === "away"){
  // 自チーム先攻
  topName = "Ambitions";
  topData = innings;

  bottomName = match.opponent;
  bottomData = opInnings;
}else{
  // 自チーム後攻
  topName = match.opponent;
  topData = opInnings;

  bottomName = "Ambitions";
  bottomData = innings;
}

let total = topData.reduce((a,b)=>a+(b||0),0);
let bottomTotal = bottomData.reduce((a,b)=>a+(b||0),0);

// ✅ イニング数決定
let maxInning = 9;

for(let i = 9; i < Math.max(topData.length, bottomData.length); i++){
  if(topData[i] != null || bottomData[i] != null){
    maxInning = i + 1;
  }
}

let scoreHTML = "<table>";

scoreHTML += "<tr class='header'><th>チーム</th>";
for(let i=1;i<=maxInning;i++){
  scoreHTML += `<th>${i}</th>`;
}
scoreHTML += "<th>計</th></tr>";

// 上段
scoreHTML += `<tr class='${topName === "Ambitions" ? "green" : ""}'><td>${topName}</td>`;
for(let i=0;i<maxInning;i++){
  const v = topData[i];

  scoreHTML += `<td>${
    v === null && 
    i === maxInning-1 && 
    total > bottomTotal && topName !== "Ambitions"
      ? "×"
      : (v ?? "-")
  }</td>`;
}

scoreHTML += `<td>${total}</td></tr>`;

// 下段
scoreHTML += `<tr><td>${bottomName}</td>`;
for(let i=0;i<maxInning;i++){
  const v = bottomData[i];

  scoreHTML += `<td>${
    v === null && 
    i === maxInning-1 && 
    bottomTotal > total &&
bottomName === "Ambitions"
      ? "×"
      : (v ?? "-")
  }</td>`;
}

scoreHTML += `<td>${bottomTotal}</td></tr>`;

scoreHTML += "</table>";

document.getElementById("score").innerHTML = scoreHTML;


// ================= 打撃 =================

function calcAVG(p){
  return p.ab ? (p.hit / p.ab).toFixed(3) : "-";
}

function calcOBP(p){
  const ab = p.ab || 0;
  const h = p.hit || 0;
  const bb = p.bb || 0;
  const sf = p.sf || 0;
  return (ab + bb + sf) ? ((h + bb)/(ab + bb + sf)).toFixed(3) : "-";
}

function calcSLG(p){
  return p.ab ? (p.tb / p.ab).toFixed(3) : "-";
}

function calcOPS(p){
  const obp = calcOBP(p);
  const slg = calcSLG(p);

  if(obp === "-" || slg === "-") return "-";

  return (parseFloat(obp) + parseFloat(slg)).toFixed(3);
}

function calcRISP(p){
  return p.risp_ab ? (p.risp_hit / p.risp_ab).toFixed(3) : "-";
}

let batHTML = "<table>";

batHTML += "<tr class='header'>";
batHTML += `
<th>名前</th>
<th>打席</th>
<th>打数</th>
<th>安打</th>
<th>四死球</th>
<th>三振</th>
<th>犠打</th>
<th>犠飛</th>
<th>残塁</th>
<th>RISP打</th>
<th>RISP安</th>
<th>得点</th>
<th>打点</th>
<th>盗塁</th>
<th>盗刺</th>
<th>二塁打</th>
<th>三塁打</th>
<th>本塁打</th>
<th>塁打</th>
<th>打率</th>
<th>出塁率</th>
<th>長打率</th>
<th>OPS</th>
<th>RISP率</th>
`;
batHTML += "</tr>";

(match.batters || []).forEach(p => {

  batHTML += `
  <tr>
    <td>${p.name}</td>

    <td>${p.pa||0}</td>
    <td>${p.ab||0}</td>
    <td>${p.hit||0}</td>
    <td>${p.bb||0}</td>
    <td>${p.so||0}</td>
    <td>${p.sh||0}</td>
    <td>${p.sf||0}</td>
    <td>${p.lob||0}</td>

<td>${p.risp_ab||0}</td>
<td>${p.risp_hit||0}</td>

<td>${p.run||0}</td>
<td>${p.rbi||0}</td>

<td>${p.sb||0}</td>
<td>${p.cs||0}</td>

    <td>${p.double||0}</td>
    <td>${p.triple||0}</td>
    <td>${p.hr||0}</td>
    <td>${p.tb||0}</td>

    <td>${calcAVG(p)}</td>
<td>${calcOBP(p)}</td>
<td>${calcSLG(p)}</td>
<td>${calcOPS(p)}</td>

<td>${calcRISP(p)}</td>
  </tr>
  `;
});

batHTML += "</table>";
document.getElementById("bat").innerHTML = batHTML;

// ================= 投手 =================

function calcWHIP(p){
  const ip = p.inning || 0;
  return ip ? ((p.hit + p.bb)/ip).toFixed(2) : "-";
}

function calcKBB(p){
  return p.bb ? (p.k / p.bb).toFixed(2) : "-";
}

let pitchHTML = "<table>";
pitchHTML += "<tr class='header'>";
pitchHTML += "<th>名前</th><th>回</th><th>打者</th><th>打数</th><th>球数</th>";
pitchHTML += "<th>被安打</th><th>被本</th><th>被犠打</th><th>被犠飛</th>";
pitchHTML += "<th>四球</th><th>死球</th><th>三振</th><th>暴投</th><th>ボーク</th>";
pitchHTML += "<th>失点</th><th>自責</th><th>防御率</th><th>WHIP</th><th>K/BB</th>";

(match.pitchers || []).forEach(p=>{

  const era = p.inning ? (p.er / p.inning * 9).toFixed(2) : "-";

  pitchHTML += `
<tr>
  <td>${p.name}</td>
  <td>${p.inning||0}</td>
  <td>${p.bf||0}</td>
  <td>${p.ab||0}</td>
  <td>${p.pitch||0}</td>

  <td>${p.hit||0}</td>
  <td>${p.hr||0}</td>
  <td>${p.sh||0}</td>
  <td>${p.sf||0}</td>

  <td>${p.bb||0}</td>
  <td>${p.hbp||0}</td>
  <td>${p.k||0}</td>
  <td>${p.wp||0}</td>
  <td>${p.bk||0}</td>

  <td>${p.runs||0}</td>
  <td>${p.er||0}</td>
  <td>${era}</td>
  <td>${calcWHIP(p)}</td>
  <td>${calcKBB(p)}</td>
</tr>
  `;
});

pitchHTML += "</table>";

document.getElementById("pitch").innerHTML = pitchHTML; 

}


window.goList = function(){
  location.href = "game_list.html";
}

loadGame();
</script>

</body>
</html>
