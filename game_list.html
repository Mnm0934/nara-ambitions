<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>試合一覧</title>

<style>
body{
  background:#e5d58a;
  text-align:center;
  font-family:sans-serif;
}

.box{
  border:1px solid #333;
  margin:10px auto;
  padding:20px;
  width:80%;
  background:white;
}

.win{ background:#4caf50; color:white; }
.lose{ background:#e53935; color:white; }
.draw{ background:#999; color:white; }

button{
  padding:8px 14px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#ffcc00;
  color:black;
  font-weight:bold;
}

h2{
  color:red;
}

.scoreboard{
  border-collapse:collapse;
  margin:15px auto;
  font-size:16px;   /* ← 大きく */
  min-width:80%;    /* ← 横に広げる */
}

.scoreboard th,
.scoreboard td{
  border:1px solid #000;
  padding:6px 10px;
  background:white;
  color:black;
}

.scoreboard th{
  background:#ddd;
}

.scoreboard th:first-child{
  background:#333;
  color:white;
  font-weight:bold;
}

.scoreboard.win{
  border:2px solid blue;
}

.scoreboard.lose{
  border:2px solid red;
}

.scoreboard.draw{
  border:2px solid gray;
}

.scoreboard td:last-child,
.scoreboard th:last-child{
  font-weight:bold;
  background:#ffe;
}

/* 👇ここに追加 */
.year, .month{
  display:none;
}

select{
  font-size:26px;
  padding:12px 20px;
  border-radius:12px;
  border:2px solid #333;
  background:#fff8cc;
  font-weight:bold;
  cursor:pointer;
}

h3{
  display:inline-block;
  padding:12px 20px;
  margin:15px 0;
  background:#ffcc00;
  border-radius:12px;
  cursor:pointer;
  font-size:24px;
  font-weight:bold;
  border:2px solid #333;
  box-shadow:2px 2px 5px rgba(0,0,0,0.3);
}

h3:hover{
  background:#ffb300;
}

</style>
</head>

<body>
<script>
const saved = localStorage.getItem("userLogin");

if(!saved){
  alert("ログインしてください");
  location.href = "index.html";
}else{
  const user = JSON.parse(saved);

  // ✅ 有効期限チェック
  if(Date.now() > user.expire){
    alert("ログインの有効期限が切れました");

    localStorage.removeItem("userLogin");

    location.href = "index.html";
    return;
  }

  // ✅ 管理者判定
  window.isAdmin = user.id === "admin";

  // ✅ セッション延長（1時間再セット）
  user.expire = Date.now() + (1 * 60 * 60 * 1000);
  localStorage.setItem("userLogin", JSON.stringify(user));
}

</script>

<h2>NARA Ambitions club 試合一覧</h2>

<button onclick="goTop()">TOPへ戻る</button>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

// グローバル化
window.db = db;
window.getDocs = getDocs;
window.collection = collection;
window.deleteDoc = deleteDoc;
window.doc = doc;
</script>

<script>

// ✅ データ取得
let data = [];

async function loadData(){

  const snap = await window.getDocs(window.collection(window.db, "results"));

  data = [];

  snap.forEach(docSnap => {
    data.push({
  ...docSnap.data(),
  id: docSnap.id
});
  });

  console.log(data);  // ←これ追加！！！

  renderList();
}

// ✅ 年月ごとにグループ化
function renderList(){

  const groups = {};

  data.forEach(game=>{

    if (!game.date) return;
    const date = new Date(game.date);

    if (isNaN(date)) return;

    const y = date.getFullYear();
    const m = date.getMonth() + 1;

    if(!groups[y]) groups[y] = {};
    if(!groups[y][m]) groups[y][m] = [];

    groups[y][m].push(game);
  });

  // ✅ これ追加！！！！！
  if (Object.keys(groups).length === 0){
    document.getElementById("list").innerHTML = "試合データなし";
    return;
  }

  let html = "";

  Object.keys(groups).sort((a,b)=>b-a).forEach(year=>{

    html += `<h3 onclick="toggleYear(this)">▼ ${year}年</h3>`;
    html += `<div class="year" style="display:block">`;

    html += `
    <select onchange="changeMonth(this, '${year}')">
      ${Object.keys(groups[year])
        .sort((a,b)=>b-a)
        .map(m => `<option value="${m}">${m}月</option>`)
        .join("")}
    </select>

    <div id="month-${year}"></div>
    `;

    const firstMonth = Object.keys(groups[year]).sort((a,b)=>b-a)[0];

    setTimeout(()=>{
      changeMonth({value:firstMonth}, year);
    },0);

    html += `</div>`;
  });

  document.getElementById("list").innerHTML = html;

  // グローバルに持たせる
  window.groups = groups;
}




// ✅ 詳細へ
function goDetail(id){
  location.href = "game_detail.html?id=" + id;
}


function createScoreBoard(my, op, cls, game){
let topName, topData, bottomName, bottomData;

// ✅ 何回まで表示するか決める
let maxInning = 9;

// 延長あれば増やす
for(let i=9; i<my.length; i++){
  if(my[i] != null || op[i] != null){
    maxInning = i + 1;
  }
}

if(game.batFirst === "away"){
  // 自チームが先攻
  topName = "Ambitions";
  topData = my;
  bottomName = game.opponent;
  bottomData = op;
}else{
  // 自チームが後攻
  topName = game.opponent;
  topData = op;
  bottomName = "Ambitions";
  bottomData = my;
}

  let html = `<table class='scoreboard ${cls}'>`;

  // ✅ ヒット合計計算（打者データから）
let myHits = 0;
let opHits = 0;


// 自チームのヒット数（H）を計算するための変数

  // batterデータから合計
  // ※ game単位の結果から取得
  // thisは外で使えないので関数外参照する必要あり

  // ヘッダー
  html += "<tr><th></th>";
  for(let i=0;i<maxInning;i++){
    html += `<th>${i+1}</th>`;
  }
  html += "<th>R</th><th>H</th></tr>";

// ✅ 先に計算！！
const myTotal = topData.reduce((a,b)=>a+(b||0),0);
const opTotal = bottomData.reduce((a,b)=>a+(b||0),0);

html += `<tr><th>${topName}</th>`;

for(let i=0;i<maxInning;i++){
  const v = topData[i];

  html += `<td>${
    v === null && i === maxInning-1 && myTotal > opTotal && topName !== "Ambitions"
      ? "×"
      : (v ?? "-")
  }</td>`;
}

  // ✅ ヒット合計（バッターから）
const gameData = data.find(g =>
  g.date === game.date &&
  g.game === game.game &&
  g.opponent === game.opponent
);

// ✅ 自チームヒット（打者）
let totalHits = 0;

if(gameData && gameData.batters){
  totalHits = gameData.batters.reduce((a,b)=>a+(b.hit||0),0);
}

// ✅ 相手ヒット（投手の被安打）←これ追加
if(gameData && gameData.pitchers){
  opHits = gameData.pitchers.reduce((a,b)=>a+(b.hit||0),0);
}

// ✅ 上段用
// ✅ 自チームヒット
myHits = totalHits;

// ✅ 相手ヒット（投手から）
if(gameData && gameData.pitchers){
  opHits = gameData.pitchers.reduce((a,b)=>a+(b.hit||0),0);
}

const topHits = topName === "Ambitions" ? myHits : opHits;

html += `<td>${myTotal}</td><td>${topHits}</td></tr>`;

    // 相手（ヒット不明なので0 or 空）
  html += `<tr><th>${bottomName}</th>`;

for(let i=0;i<maxInning;i++){
  const v = bottomData[i];

  html += `<td>${
    v === null && i === maxInning-1 && myTotal > opTotal && bottomName === "Ambitions"
      ? "×"
      : (v ?? "-")
  }</td>`;
}

  const bottomHits = bottomName === "Ambitions" ? myHits : opHits;

html += `<td>${opTotal}</td><td>${bottomHits}</td></tr>`;

// ✅ コールド・延長判定
let note = "";

if(maxInning < 9){
  note = `（${maxInning}回コールド）`;
}else if(maxInning > 9){
  note = `（延長${maxInning}回）`;
}

html += "</table>";

html += `<div style="margin-top:5px; font-weight:bold;">${note}</div>`;

return html;
}

function editGame(id){
  location.href = "game_input.html?id=" + id;
}

function goTop(){
  location.href = "member-only.html";
}

/* 👇👇👇 ここに追加！！👇👇👇 */

async function deleteGame(id){

  if(!confirm("本当に削除しますか？")) return;

  await window.deleteDoc(
  window.doc(window.db, "results", id)
);


  alert("削除しました");

  loadData(); // ← 再読み込み
}

function toggleYear(el){
  const next = el.nextElementSibling;

  if(next.style.display === "none"){
    next.style.display = "block";
    el.innerHTML = el.innerHTML.replace("▶","▼");
  }else{
    next.style.display = "none";
    el.innerHTML = el.innerHTML.replace("▼","▶");
  }
}

function toggleMonth(el){
  const next = el.nextElementSibling;
  next.style.display = next.style.display === "none" ? "block" : "none";
}

function changeMonth(select, year){

  const groups = window.groups;
  if (!groups || !groups[year]) return;

  const month = select.value;
  if (!groups[year][month]) return;

  const target = document.getElementById(`month-${year}`);

  let html = "";

  groups[year][month].forEach(game=>{

    const my = game.myInnings || [];
    const op = game.opInnings || [];

    const myTotal = my.reduce((a,b)=>a+(b||0),0);
    const opTotal = op.reduce((a,b)=>a+(b||0),0);

    let cls = "";
    let result = "";

    if(myTotal > opTotal){
      cls = "win"; result = "勝利";
    }else if(myTotal < opTotal){
      cls = "lose"; result = "敗北";
    }else{
      cls = "draw"; result = "引分";
    }

html += `
<div class="box ${cls}">
  ${game.date} ${game.game}<br>
  vs ${game.opponent}<br>
  <b>${myTotal} - ${opTotal}</b>

  ${createScoreBoard(my, op, cls, game)}

  <b>${result}</b><br>

  <button onclick="goDetail('${game.id}')">詳細</button>

  ${window.isAdmin ? `
    <button onclick="editGame('${game.id}')">編集</button>
    <button onclick="deleteGame('${game.id}')">削除</button>
  ` : ``}
</div>
`;
  });

  target.innerHTML = html;
}

window.addEventListener("load", () => {

  const wait = setInterval(async () => {

    if (window.getDocs) {
      clearInterval(wait);
      await loadData();
    }

  }, 50);

});

</script>

</body>
</html>
