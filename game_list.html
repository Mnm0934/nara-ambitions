<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>試合一覧</title>

<style>
body{
  background:#02142c;
  color:white;
  text-align:center;
  font-family:sans-serif;
}

.box{
  background:white;
  color:black;
  border:1px solid #333;
  margin:10px auto;
  padding:20px;
  width:min(900px,95%);
  overflow-x:auto;
}


.win{ background:#4caf50; color:white; }
.lose{ background:#e53935; color:white; }
.draw{ background:#999; color:white; }

button{
  padding:14px 28px;
  font-size:28px;
  margin:10px;
  border:none;
  border-radius:8px;
  background:#ffcc00;
  color:black;
  font-weight:bold;
}

@media (max-width:600px){

  .scoreboard th,
.scoreboard td{
  font-size:14px;
  padding:4px;
}

.scoreboard th:first-child{
  font-size:16px;
}

  select{
    font-size:18px;
  }
}


h2{
  color:red;
}

.scoreboard{
  border-collapse:collapse;
  margin:20px auto;
  font-size:20px;
  width:auto;
}

.scoreboard th,
.scoreboard td{
  border:1px solid #000;
  padding:12px 14px;
  font-size:16px;
  background:white;
  color:black;
}

.scoreboard th{
  background:#ddd;
}

.scoreboard th:first-child{
  background:#333;
  color:white;
  font-weight:bold;
  font-size:18px;
}

.scoreboard.win{
  border:2px solid blue;
}

.scoreboard.lose{
  border:2px solid red;
}

.scoreboard.draw{
  border:2px solid gray;
}

.scoreboard td:last-child,
.scoreboard th:last-child{
  font-weight:bold;
  background:#ffe;
}

/* 👇ここに追加 */
.year, .month{
  display:none;
}

select{
  min-width:220px;
  text-align:center;

  font-size:24px;
  font-weight:bold;

  padding:12px 20px;

  border-radius:15px;
  border:3px solid #333;

  background:white;
  cursor:pointer;

  margin-bottom:15px;
}

.filter-area{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  gap:30px;
  flex-wrap:wrap;

  margin-bottom:30px;
}

.select-title{
  font-size:20px;
  font-weight:bold;
  margin-bottom:10px;
}

.top-btn{
  background:#d6002a;
  color:white;
  padding:12px 24px;
  font-size:18px;

  border:none;
  border-radius:30px;

  box-shadow:0 5px 15px rgba(0,0,0,.4);
}

#seasonStats{
transition:0.3s;
  max-width:500px;
  margin:20px auto;

  padding:20px;

  background:#ffffff;
  color:black;

  border-radius:15px;

  font-size:24px;
  font-weight:bold;

  box-shadow:0 5px 15px rgba(0,0,0,.4);
}

.game-card{
  background:white;
  color:black;

  border-radius:20px;

  overflow:hidden;

  margin:20px auto;

  max-width:900px;

  box-shadow:0 10px 30px rgba(0,0,0,.4);
}

.win-header{
  background:#00c853;
}

.lose-header{
  background:#e53935;
}

.draw-header{
  background:#757575;
}

.card-header{
  font-size:42px;
  font-weight:bold;
  padding:22px;
}

.card-body{
  padding:10px 20px;
}

.main-score{
  font-size:28px;
  font-weight:bold;
  margin:5px 0;
}

.game-date{
  color:#666;
  margin:8px 0;
  font-size:26px;
  line-height:1.1;
}

.mvp-line{
  color:#ff6600;
  font-weight:bold;
  font-size:24px;
  margin:10px 0;
  line-height:1.1;
}

</style>
</head>

<body>
<script>
const saved = localStorage.getItem("userLogin");

if(!saved){
  alert("ログインしてください");
  location.href = "index.html";
}else{
  const user = JSON.parse(saved);

  // ✅ 有効期限チェック
  if(Date.now() > user.expire){
    alert("ログインの有効期限が切れました");

    localStorage.removeItem("userLogin");

    location.href = "index.html";
    return;
  }

  // ✅ 管理者判定
  window.isAdmin = user.id === "admin";

  // ✅ セッション延長（1時間再セット）
  user.expire = Date.now() + (1 * 60 * 60 * 1000);
  localStorage.setItem("userLogin", JSON.stringify(user));
}

</script>

<h2>NARA Ambitions club 試合一覧</h2>

<button class="top-btn" onclick="goTop()">
  TOPへ戻る
</button>

<div id="list"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

// グローバル化
window.db = db;
window.getDocs = getDocs;
window.collection = collection;
window.deleteDoc = deleteDoc;
window.doc = doc;
</script>

<script>

// ✅ データ取得
let data = [];

async function loadData(){

  const snap = await window.getDocs(window.collection(window.db, "results"));

  data = [];

  snap.forEach(docSnap => {
    data.push({
  ...docSnap.data(),
  id: docSnap.id
});
  });

data.sort((a, b) => new Date(b.date) - new Date(a.date));

  console.log(data);  // ←これ追加！！！

  renderList();
}

function renderList(){

  const groups = {};

  data.forEach(game => {

    if(!game.date) return;

    const date = new Date(game.date);

    if(isNaN(date)) return;

    const y = date.getFullYear();
    const m = date.getMonth() + 1;

    if(!groups[y]) groups[y] = {};
    if(!groups[y][m]) groups[y][m] = [];

    groups[y][m].push(game);

  });

  if(Object.keys(groups).length === 0){
    document.getElementById("list").innerHTML =
      "試合データなし";
    return;
  }

  let html = `

    <div class="filter-area">

  <div>

    <div class="select-title">
      シーズン
    </div>

    <select
      id="yearSelect"
      onchange="changeYear(this.value)">

        ${Object.keys(groups)
          .sort((a,b)=>b-a)
          .map(year=>`
            <option value="${year}">
              ${year}年
            </option>
          `).join("")}

   </select>

  </div>

  <div id="yearArea"></div>

</div>
<div id="seasonStats"></div>
<div id="gamesArea"></div>

  `;

  document.getElementById("list").innerHTML = html;

  window.groups = groups;

  const firstYear =
    Object.keys(groups)
      .sort((a,b)=>b-a)[0];

  changeYear(firstYear);
}



// ✅ 詳細へ
function goDetail(id){
  location.href = "game_detail.html?id=" + id;
}


function createScoreBoard(my, op, cls, game){
let topName, topData, bottomName, bottomData;

// ✅ 何回まで表示するか決める
let maxInning = 9;

// 延長あれば増やす
for(let i=9; i<my.length; i++){
  if(my[i] != null || op[i] != null){
    maxInning = i + 1;
  }
}

if(game.batFirst === "away"){
  // 自チームが先攻
  topName = "Ambitions";
  topData = my;
  bottomName = game.opponent;
  bottomData = op;
}else{
  // 自チームが後攻
  topName = game.opponent;
  topData = op;
  bottomName = "Ambitions";
  bottomData = my;
}

  let html = `<table class='scoreboard ${cls}'>`;

  // ✅ ヒット合計計算（打者データから）
let myHits = 0;
let opHits = 0;


// 自チームのヒット数（H）を計算するための変数

  // batterデータから合計
  // ※ game単位の結果から取得
  // thisは外で使えないので関数外参照する必要あり

  // ヘッダー
  html += "<tr><th></th>";
  for(let i=0;i<maxInning;i++){
    html += `<th>${i+1}</th>`;
  }
  html += "<th>R</th><th>H</th></tr>";

// ✅ 先に計算！！
const myTotal = topData.reduce((a,b)=>a+(b||0),0);
const opTotal = bottomData.reduce((a,b)=>a+(b||0),0);

html += `<tr><th>${topName}</th>`;

for(let i=0;i<maxInning;i++){
  const v = topData[i];

  html += `<td>${
    v === null && i === maxInning-1 && myTotal > opTotal && topName !== "Ambitions"
      ? "×"
      : (v ?? "-")
  }</td>`;
}

  // ✅ ヒット合計（バッターから）
const gameData = data.find(g =>
  g.date === game.date &&
  g.game === game.game &&
  g.opponent === game.opponent
);

// ✅ 自チームヒット（打者）
let totalHits = 0;

if(gameData && gameData.batters){
  totalHits = gameData.batters.reduce((a,b)=>a+(b.hit||0),0);
}

// ✅ 相手ヒット（投手の被安打）←これ追加
if(gameData && gameData.pitchers){
  opHits = gameData.pitchers.reduce((a,b)=>a+(b.hit||0),0);
}

// ✅ 上段用
// ✅ 自チームヒット
myHits = totalHits;

// ✅ 相手ヒット（投手から）
if(gameData && gameData.pitchers){
  opHits = gameData.pitchers.reduce((a,b)=>a+(b.hit||0),0);
}

const topHits = topName === "Ambitions" ? myHits : opHits;

html += `<td>${myTotal}</td><td>${topHits}</td></tr>`;

    // 相手（ヒット不明なので0 or 空）
  html += `<tr><th>${bottomName}</th>`;

for(let i=0;i<maxInning;i++){
  const v = bottomData[i];

  html += `<td>${
    v === null && i === maxInning-1 && myTotal > opTotal && bottomName === "Ambitions"
      ? "×"
      : (v ?? "-")
  }</td>`;
}

  const bottomHits = bottomName === "Ambitions" ? myHits : opHits;

html += `<td>${opTotal}</td><td>${bottomHits}</td></tr>`;

// ✅ コールド・延長判定
let note = "";

if(maxInning < 9){
  note = `（${maxInning}回コールド）`;
}else if(maxInning > 9){
  note = `（延長${maxInning}回）`;
}

html += "</table>";

html += `<div style="margin-top:5px; font-weight:bold;">${note}</div>`;

return html;
}

function editGame(id){
  location.href = "game_input.html?id=" + id;
}

function goTop(){
  location.href = "member-only.html";
}

/* 👇👇👇 ここに追加！！👇👇👇 */

async function deleteGame(id){

  if(!confirm("本当に削除しますか？")) return;

  await window.deleteDoc(
  window.doc(window.db, "results", id)
);


  alert("削除しました");

  loadData(); // ← 再読み込み
}


function isAdminUser(){
  try{
    const saved = localStorage.getItem("userLogin");
    if(!saved) return false;

    const user = JSON.parse(saved);

    return String(user.id).trim().toLowerCase() === "admin";

  }catch(e){
    return false;
  }
}

function changeYear(year){

  const groups = window.groups;

  const area =
    document.getElementById("yearArea");

  area.innerHTML = `

  <div>

    <div class="select-title">
      月
    </div>

    <select
      id="monthSelect"
      onchange="changeMonth(this,'${year}')">

      ${Object.keys(groups[year])
        .sort((a,b)=>b-a)
        .map(month=>`
          <option value="${month}">
            ${month}月
          </option>
        `).join("")}

    </select>

  </div>

`;

  const monthSelect =
    document.getElementById("monthSelect");

let win = 0;
let lose = 0;
let draw = 0;

Object.values(groups[year]).forEach(monthGames=>{

  monthGames.forEach(game=>{

    const my =
      (game.myInnings || [])
      .reduce((a,b)=>a+(b||0),0);

    const op =
      (game.opInnings || [])
      .reduce((a,b)=>a+(b||0),0);

    if(my > op){
      win++;
    }
    else if(my < op){
      lose++;
    }
    else{
      draw++;
    }

  });

});

const totalGames =
  win + lose + draw;

const pct =
  (win + lose)
  ? (win / (win + lose)).toFixed(3)
  : ".000";

document.getElementById("seasonStats").innerHTML = `
🏆 ${year}シーズン<br><br>

${totalGames}試合<br>

${win}勝 ${lose}敗 ${draw}分<br>

勝率 ${pct}
`;

// ↓ここから追加
let color = "#333";

if(Number(pct) >= 0.700){
  color = "#00c853";
}
else if(Number(pct) >= 0.500){
  color = "#2196f3";
}
else{
  color = "#e53935";
}

const stats =
  document.getElementById("seasonStats");

stats.style.color = color;

stats.style.border =
  `4px solid ${color}`;

stats.style.boxShadow =
  `0 0 20px ${color}`;

changeMonth(monthSelect, year);

}

function changeMonth(select, year){

  const groups = window.groups;
  if (!groups || !groups[year]) return;

  const month = select.value;
  if (!groups[year][month]) return;

  const target =
  document.getElementById("gamesArea");

  let html = "";

  groups[year][month]
  .sort((a,b) => new Date(b.date) - new Date(a.date))
  .forEach(game=>{

    const my = game.myInnings || [];
    const op = game.opInnings || [];

    const myTotal = my.reduce((a,b)=>a+(b||0),0);
    const opTotal = op.reduce((a,b)=>a+(b||0),0);

    let cls = "";
    let result = "";

    if(myTotal > opTotal){
  cls = "win";
  result = "🟢 勝利";
}
else if(myTotal < opTotal){
  cls = "lose";
  result = "🔴 敗北";
}
else{
  cls = "draw";
  result = "⚪ 引分";
}

let headerClass = "";
let titleText = "";

if(myTotal > opTotal){
  headerClass = "win-header";
  titleText = "🟢 WIN";
}
else if(myTotal < opTotal){
  headerClass = "lose-header";
  titleText = "🔴 LOSE";
}
else{
  headerClass = "draw-header";
  titleText = "⚪ DRAW";
}
let mvpName = "-";

if(game.batters?.length){

  let maxPoint = -1;

  game.batters.forEach(p=>{

    const point =
  (p.hit || 0) * 2
  + (p.rbi || 0) * 3
  + (p.hr || 0) * 5
  + (p.run || 0)
  + (p.sb || 0) * 0.5;

    if(point > maxPoint){
      maxPoint = point;
      mvpName = p.name;
    }

  });
}
html += `
<div class="game-card">

  <div class="card-header ${headerClass}">
    ${titleText}
  </div>

  <div class="card-body">

    <div class="main-score">
      Ambitions ${myTotal}-${opTotal}
      ${game.opponent}
    </div>

    <div class="game-date">
      ${game.date}<br>
      ${game.game}
    </div>

    ${mvpName !== "-"
  ? `
  <div class="mvp-line">
    ${
      myTotal > opTotal
          ? `🔥 MVP 🔥<br>${mvpName}`
        : myTotal < opTotal
          ? `⭐ 敢闘賞 ⭐<br>${mvpName}`
          : ``
    }
  </div>
  `
  : ""
}


    ${createScoreBoard(my, op, cls, game)}

    <button onclick="goDetail('${game.id}')">
      詳細
    </button>

    ${
      isAdminUser()
      ? `
      <button onclick="editGame('${game.id}')">
        編集
      </button>

      <button onclick="deleteGame('${game.id}')">
        削除
      </button>
      `
      : ""
    }

  </div>

</div>
`;
  });

  target.innerHTML = html;
}

window.addEventListener("load", () => {

  const wait = setInterval(async () => {

    if (window.getDocs) {
      clearInterval(wait);
      await loadData();
    }

  }, 50);

});

</script>

</body>
</html>
