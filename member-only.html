<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>部員専用ページ</title>

<style>
body{
  margin:0;
  background:#02142c;
  color:white;
  font-family:'Noto Sans JP', sans-serif;
}
.container{
  max-width:900px;
  margin:100px auto;
}
h1{
  text-align:center;
  margin-bottom:40px;
}
.menu{
  display:flex;
  flex-direction:column;
  gap:15px;
}
.menu a{
  display:block;
  padding:15px;
  background:#0a1f3f;
  border-left:5px solid #d6002a;
  text-decoration:none;
  color:white;
  font-size:18px;
  transition:0.2s;
}
.menu a:hover{
  background:#d6002a;
  transform:translateX(5px);
}
.logout{
  margin-top:40px;
  text-align:center;
}
button{
  padding:10px 20px;
  background:#d6002a;
  color:white;
  border:none;
  cursor:pointer;
}
</style>

</head>

<body>

<script>
const saved = localStorage.getItem("userLogin");

if(saved){
  const user = JSON.parse(saved);

  // ✅ 期限OKなら何もせずそのまま表示
  if(Date.now() < user.expire){
    // スキップ（ここが重要）
  }else{
    // ❌ 期限切れ
    localStorage.removeItem("userLogin");
    location.href = "index.html";
  }

}else{
  // ✅ 未ログインならログイン画面へ
  alert("ログインしてください");
  location.href = "index.html";
}

</script>


<div class="container">

  <h1>部員専用ページ</h1>

  <div class="menu">

    <a href="attendance.html">出欠入力</a>
    <a href="attendance-list.html">出欠一覧</a>

    <a href="member-schedule.html">活動日程スケジュール</a>

    <a href="news-admin.html">NEWS登録</a>

    <a href="game_list.html">試合結果一覧</a>
    <a href="results-admin.html">選手成績一覧</a>

    <a href="video-list.html">試合動画一覧</a>
    <a href="video-form.html" class="admin-only">試合動画登録(管理者限定)</a>

    <a href="game_input.html" class="admin-only">成績入力(管理者限定)</a>

    <a href="event.html" class="admin-only">予定登録(管理者限定)</a>

    <a href="members.html" class="admin-only">選手登録(管理者限定)</a>

    <a href="rules.pdf" target="_blank">部則（PDF）</a>
    <a href="nyuubu.pdf" target="_blank">入部届（PDF）</a>
    <a href="kyubu.pdf" target="_blank">休部届（PDF）</a>
    <a href="taibu.pdf" target="_blank">退部届（PDF）</a>

    <a href="https://www.ambitions1996.com/">旧ホームページを見る</a>

  </div>

  <div class="logout">
    <button onclick="logout()">ログアウト</button>
  </div>

</div>

<script>
function logout(){
  alert("ログアウトしました");
  localStorage.removeItem("userLogin");
  location.href = "index.html";
}
window.onload = function(){

  const saved = localStorage.getItem("userLogin");
  const user = saved ? JSON.parse(saved) : null;

  const isAdmin = user && user.id === "admin";

  if(!isAdmin){
    document.querySelectorAll(".admin-only").forEach(el=>{
      el.style.display = "none";
    });
  }
};
</script>

</body>
</html>
