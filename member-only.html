<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>部員専用ページ</title>

<style>
body{
  margin:0;
  background:#02142c;
  color:white;
  font-family:'Noto Sans JP', sans-serif;
}
.container{
  max-width:900px;
  margin:30px auto;
  padding:15px;

  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

h1{
  text-align:center;
  margin-bottom:25px;
  font-size:clamp(28px,5vw,42px);
}

.folder{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.3);

  display:flex;
  flex-direction:column;
}

.folder a{
  display:block;
  margin-top:10px;
  padding:16px;
  background:#112b55;
  border-radius:12px;
  color:white;
  text-decoration:none;
  transition:.2s;
  font-size:16px;
  font-weight:bold;
}

.folder a:hover{
  background:#d6002a;
  transform:translateX(5px);
}

.folder h3{
  font-size:20px;
  margin-top:0;
  color:#ffd600;
  border-bottom:1px solid rgba(255,255,255,0.2);
  padding-bottom:10px;
  text-align:center;
}

.logout{
  margin-top:40px;
  text-align:center;
}
button{
  padding:10px 20px;
  background:#d6002a;
  color:white;
  border:none;
  cursor:pointer;
}

/* スマホ */
@media (max-width:768px){

  h1{
    font-size:24px;
    line-height:1.4;
    padding:0 15px;
  }

  .container{
    grid-template-columns:1fr;
    gap:20px;
    padding:10px;
  }

  .folder{
    padding:29px;
  }

  .folder h3{
    font-size:24px;
  }

  .folder a{
    font-size:20px;
    padding:20px;
    line-height:1.4;
  }

  button{
    font-size:20px;
    padding:14px 30px;
  }

}

/* フォルダの中身は最初隠す */
.folder-content{
  display:none;
  margin-top:15px;
}

/* 開いた時だけ表示 */
.folder.open .folder-content{
  display:flex;
  flex-direction:column;
}

/* タップできるように */
.folder h3{
  cursor:pointer;
}

.folder h3{
  cursor:pointer;
  display:flex;
  justify-content:space-between;
  align-items:center;
}

.arrow{
  font-size:0.8em;
}

.folder.open h3{
  color:#fff;
}

.folder.open{
  border:2px solid #ffd600;
}

</style>

</head>

<body>

<script>
const saved = localStorage.getItem("userLogin");

if(saved){
  const user = JSON.parse(saved);

  if(Date.now() > user.expire){
    localStorage.removeItem("userLogin");

    // ✅ ログインフォーム出して戻す
    location.href = "index.html?login=1";
  }

}else{
  location.href = "index.html?login=1";
}


</script>


<h1>⚾ 奈良Ambitions 部員専用ページ</h1>

<div class="container">

  <div class="folder">

    📅 出欠・スケジュール

  <div class="folder-content">

</div>


<div class="folder">

  <div class="folder-content">

    <a href="game_list.html">試合結果一覧</a>
    <a href="results-admin.html">選手成績一覧</a>
    <a href="video-list.html">試合動画一覧</a>

</div>

<div class="folder admin-folder">

  <h3 onclick="toggleFolder(this)">
    👥 管理者メニュー
  <span class="arrow">▼</span>

  <div class="folder-content">

    <a href="news-admin.html" class="admin-only">

<a href="game_input.html" class="admin-only">

<div class="folder">

<div class="folder">

    🌐 その他

  <div class="folder-content">

</a>
</div>
</div>
</div>

  <div class="logout">
    <button onclick="logout()">ログアウト</button>
  </div>


<script>
function toggleFolder(el){

  document.querySelectorAll(".folder").forEach(folder=>{

    if(folder !== el.parentElement){

      folder.classList.remove("open");

      const otherArrow =
        folder.querySelector(".arrow");

      if(otherArrow){
        otherArrow.textContent = "▼";
      }

    }

  });

  const folder = el.parentElement;

  folder.classList.toggle("open");

  const arrow = el.querySelector(".arrow");

  if(arrow){

    arrow.textContent =
      folder.classList.contains("open")
      ? "▲"
      : "▼";

  }
}

function logout(){
  alert("ログアウトしました");
  localStorage.removeItem("userLogin");
  location.href = "index.html";
}
window.onload = function(){

  const saved = localStorage.getItem("userLogin");
  const user = saved ? JSON.parse(saved) : null;

  const isAdmin = user && user.id === "admin";

  if(!isAdmin){

    document.querySelectorAll(".admin-only").forEach(el=>{
      el.style.display = "none";
    });

    const folder = document.querySelector(".admin-folder");

    if(folder){
      folder.style.display = "none";
    }
  }
};
</script>

</body>
