<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>部員専用ページ</title>

<style>
body{
  margin:0;
  background:#02142c;
  color:white;
  font-family:'Noto Sans JP', sans-serif;
}
.container{
  max-width:900px;
  margin:30px auto;
  padding:15px;

  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:20px;
}

h1{
  text-align:center;
  margin-bottom:25px;
  font-size:28px;
}

.folder{
  background:rgba(255,255,255,.08);
  backdrop-filter:blur(10px);
  border-radius:25px;
  padding:20px;
  box-shadow:0 6px 20px rgba(0,0,0,.3);

  display:flex;
  flex-direction:column;
}

.folder a{
  display:block;
  margin-top:10px;
  padding:16px;
  background:#112b55;
  border-radius:12px;
  color:white;
  text-decoration:none;
  transition:.2s;
  font-size:16px;
  font-weight:bold;
}

.folder a:hover{
  background:#d6002a;
  transform:translateX(5px);
}

.folder h3{
  font-size:20px;
  margin-top:0;
  color:#ffd600;
  border-bottom:1px solid rgba(255,255,255,0.2);
  padding-bottom:10px;
  text-align:center;
}

.logout{
  margin-top:40px;
  text-align:center;
}
button{
  padding:10px 20px;
  background:#d6002a;
  color:white;
  border:none;
  cursor:pointer;
}

/* スマホ */
@media (max-width:600px){

  h1{
    font-size:36px;
    line-height:1.3;
  }

  .container{
    grid-template-columns:1fr; /* 1列表示 */
    gap:25px;
    padding:20px;
  }

  .folder h3{
    font-size:32px;
  }

  .folder a{
    font-size:32px;
    padding:24px;
  }

  button{
    font-size:26px;
  }

}


</style>

</head>

<body>

<script>
const saved = localStorage.getItem("userLogin");

if(saved){
  const user = JSON.parse(saved);

  if(Date.now() > user.expire){
    localStorage.removeItem("userLogin");

    // ✅ ログインフォーム出して戻す
    location.href = "index.html?login=1";
  }

}else{
  location.href = "index.html?login=1";
}


</script>

  <div class="logout">
    <button onclick="logout()">ログアウト</button>
  </div>


<script>
function logout(){
  alert("ログアウトしました");
  localStorage.removeItem("userLogin");
  location.href = "index.html";
}
window.onload = function(){

  const saved = localStorage.getItem("userLogin");
  const user = saved ? JSON.parse(saved) : null;

  const isAdmin = user && user.id === "admin";

  if(!isAdmin){

    document.querySelectorAll(".admin-only").forEach(el=>{
      el.style.display = "none";
    });

    const folder = document.querySelector(".admin-folder");

    if(folder){
      folder.style.display = "none";
    }
  }
};
</script>

</body>
