<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>部員専用ページ</title>

<style>
body{
  margin:0;
  background:#02142c;
  color:white;
  font-family:'Noto Sans JP', sans-serif;
}
.container{
  max-width:900px;
  margin:100px auto;
}
h1{
  text-align:center;
  margin-bottom:40px;
}
.menu{
  display:flex;
  flex-direction:column;
  gap:15px;
}
.menu a{
  display:block;
  padding:15px;
  background:#0a1f3f;
  border-left:5px solid #d6002a;
  text-decoration:none;
  color:white;
  font-size:18px;
  transition:0.2s;
}
.menu a:hover{
  background:#d6002a;
  transform:translateX(5px);
}
.logout{
  margin-top:40px;
  text-align:center;
}
button{
  padding:10px 20px;
  background:#d6002a;
  color:white;
  border:none;
  cursor:pointer;
}
</style>

</head>

<body>

<script>
const USERS = {
  nakano: "1996",
  admin: "0725"
};

// ID入力
const inputId = prompt("🔐 IDを入力してください");
if(!inputId){ location.href = "index.html"; }

const inputPass = prompt("🔒 パスワードを入力してください");
if(!inputPass){ location.href = "index.html"; }

const id = inputId.trim();
const pass = inputPass.trim();

if(USERS[id] && USERS[id] === pass){

  localStorage.setItem("loggedIn", "true");

  // ✅ 有効期限も付ける
  localStorage.setItem("userLogin", JSON.stringify({
    expire: Date.now() + 1000 * 60 * 60 * 5 // 5時間
  }));

  if(id === "admin"){
    localStorage.setItem("isAdmin", "true");
  }else{
    localStorage.removeItem("isAdmin");
  }

}else{
  alert("IDまたはパスワードが違います");
  location.href = "index.html";
}
</script>


<div class="container">

  <h1>部員専用ページ</h1>

  <div class="menu">

    <a href="attendance.html">出欠入力</a>
    <a href="attendance-list.html">出欠一覧</a>

    <a href="member-schedule.html">活動日程スケジュール</a>

    <a href="news-admin.html">NEWS登録</a>

    <a href="game_list.html">試合結果一覧</a>
    <a href="results-admin.html">選手成績一覧</a>

    <a href="video-list.html">試合動画一覧</a>
    <a href="video-form.html" class="admin-only">試合動画登録(管理者限定)</a>

    <a href="game_input.html" class="admin-only">成績入力(管理者限定)</a>

    <a href="event.html" class="admin-only">予定登録(管理者限定)</a>

    <a href="members.html" class="admin-only">選手登録(管理者限定)</a>

    <a href="rules.pdf" target="_blank">部則（PDF）</a>
    <a href="nyuubu.pdf" target="_blank">入部届（PDF）</a>
    <a href="kyubu.pdf" target="_blank">休部届（PDF）</a>
    <a href="taibu.pdf" target="_blank">退部届（PDF）</a>

    <a href="https://www.ambitions1996.com/">旧ホームページを見る</a>

  </div>

  <div class="logout">
    <button onclick="logout()">ログアウト</button>
  </div>

</div>

<script>
function logout(){
  alert("ログアウトしました");
  localStorage.removeItem("loggedIn");
  localStorage.removeItem("isAdmin");
  location.href = "index.html";
}

window.onload = function(){
  const isAdmin = localStorage.getItem("isAdmin") === "true";

  if(!isAdmin){
    document.querySelectorAll(".admin-only").forEach(el=>{
      el.style.display = "none";
    });
  }
}
</script>

</body>
</html>
