<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>出欠一覧</title>

<style>
body{
  background:#02142c;
  color:white;
  text-align:center;
  padding:20px;
}

/* テーブル */
table{
  table-layout:auto;  /* or fixedでもOK */
  border-collapse:collapse;
  margin:auto;
  width:95%;
  font-size:13px;
}

#table{
  overflow-x: auto;
}

table{
  min-width: 800px;
}

@media (max-width:600px){
  table{
    font-size:12px;
  }

  th, td{
    padding:4px;
  }
}

th, td{
  border:1px solid #555;
  padding:6px;
}

th{
  background:#0a1f3f;
  position:sticky;
  top:0;
}

/* 名前列固定 */
.name{
  position:sticky;
  left:0;
  background:#0a1f3f;

  width:180px;          /* ← 好きな幅に調整 */
  white-space:nowrap;   /* ← 改行禁止🔥 */
}

/* マーク */
.ok{ color:#00e676; font-weight:bold; }
.ng{ color:#ff5252; font-weight:bold; }
.mid{ color:#ffd600; font-weight:bold; }
.none{ color:#aaa; }

/* 集計 */
.summary{
  background:#111;
  font-size:12px;
}

.rate{
  font-weight:bold;
}

/* 上部 */
.header{
  margin-bottom:10px;
}

button{
  margin:5px;
  padding:8px 12px;
  border:none;
  border-radius:5px;
}

td{
  background:#002b4d;
}

.ok{ background:#00c853; color:white; }
.ng{ background:#d50000; color:white; }
.mid{ background:#ffd600; color:black; }
.none{ background:#333; color:#aaa; }

th small{
  color:#80d8ff;
}

#tabs button{
  background:#0a1f3f;
  color:white;
  border-radius:20px;
  padding:8px 15px;
  cursor:pointer;
}

#tabs button:hover{
  background:#ff9800;
  color:black;
}


</style>
</head>

<body style="display:none;">
<script>
const saved = localStorage.getItem("userLogin");

if(!saved){
  alert("ログインしてください");
  location.href = "index.html";
}else{
  const user = JSON.parse(saved);

  if(Date.now() > user.expire){
    alert("ログインの有効期限が切れました");
    localStorage.removeItem("userLogin");
    location.href = "index.html";
  }else{
    document.body.style.display = "block";
  }
}
</script>

<h2>📊 出欠一覧</h2>
<div id="title" style="margin:10px;font-size:18px;"></div>
<div class="header">
  <button onclick="location.href='member-only.html'" style="
    background:#666;
    color:white;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;">
  ← 部員専用ページに戻る</button>

 <button onclick="location.href='attendance.html'" style="
    background:#00c853;
    color:white;
    padding:10px 15px;
    border-radius:20px;">
　出欠入力へ</button>
 

<button onclick="copyAttendanceNames()" style="
  background:#ff9800;
  color:black;
  padding:10px 15px;
  border-radius:20px;
">
出席者コピー
</button>
</div>

<div id="tabs"></div>
<div id="table"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

window.db = db;
window.collection = collection;
window.getDocs = getDocs;
// ✅ 追加（ここが一番重要🔥）
window.startApp = function(){
  if(typeof loadAll === "function"){
    loadAll();
  }
};

function getMemberNames(){
  return members.map(m => `#${m.number} ${m.name}`);
}

let data = [];
let events = [];
let members = [];
let selectedDate = null;
let currentMonth = null;

const params = new URLSearchParams(location.search);
const targetDate = params.get("date");

let dates = [];
let months = {};
let monthKeys = [];

function renderTitle(selectedMonth){

  if(!selectedMonth){
    document.getElementById("title").innerText = "予定なし";
    return;
  }

  const today = new Date();
  const todayStr = today.toISOString().slice(0,10);

  // 「2026-06」→「2026/06」
  const monthText = selectedMonth.replace("-", "/");

  document.getElementById("title").innerText =
    `${monthText} 出欠一覧（${todayStr} 現在）`;
}


function init(){

  dates = events.map(e => e.date).sort();

  months = {};
  events.forEach(e => {
    const key = e.date.slice(0,7);

    if(!months[key]) months[key] = [];

    // ✅ 重複チェックを追加
    if(!months[key].includes(e.date)){
      months[key].push(e.date);
    }

  });

  monthKeys = Object.keys(months).sort();
}


function renderTabs(){

  let html = "";

  monthKeys.forEach((m, i) => {

    html += `
      <button onclick="changeMonth('${m}')">
        ${m.replace("-", "年")}月
      </button>
    `;
  });

  document.getElementById("tabs").innerHTML = html;
}

function renderTable(selectedMonth){
if(targetDate){
  renderAttendanceDetail(targetDate);
  return;
}
let summaryHtml = "";

  const todayStr = new Date().toISOString().slice(0,10);

  // 👇これを追加する
  let targetDates = selectedMonth
  ? months[selectedMonth]
  : dates;


targetDates = targetDates
  .sort((a,b)=> new Date(a) - new Date(b));


  let html = "<table>";

  html += "<tr>";
  html += "<th class='name'>名前</th>";

  
targetDates.forEach(date => {

// ✅ 未回答者を取得
const notAnswered = members.filter(m => {

  if(m.active === false) return false;

  const id = m.name;

  // ✅ return追加
  return !data.some(d => d.name === id && d.date === date);
});

// ✅ 未回答まとめを作る（←ここが別！）
if(notAnswered.length > 0){
  summaryHtml += `
    <div style="
      background:#111;
      padding:10px;
      border-radius:5px;
      margin-bottom:5px;
      color:#ffcc00;
      font-size:13px;
      text-align:left;
    ">
      📅 ${date} 未回答：${notAnswered.map(m => m.name).join(", ")}
    </div>
  `;
}


    const ev = events.find(e => e.date === date);
    const disp = date.slice(5).replace("-", "/");

    let bgStyle = "";

// ✅ 選択中は緑
if(selectedDate === date){
  bgStyle = "style='background:#00e676;color:black;'";
}
// ✅ 今日はオレンジ
else if(date === todayStr){
  bgStyle = "style='background:#ff9800;color:black;'";
}

    let label = `<div>${disp}</div>`;

if(ev){
  label += `<small>${ev.type}</small>`;
}


    html += `<th ${bgStyle} onclick="filterDate('${date}')" style="cursor:pointer;">
  ${label}
</th>`;
  });


  html += "<th>出席</th><th>欠席</th><th>未定</th><th>出席率</th>";
  html += "</tr>";

  // メンバーごと
  members.forEach(m=>{

  const id = m.name;
  const displayName = `#${m.number} ${m.name}`;

  if(selectedDate){

  const rec = data.find(d => d.name === id && d.date === selectedDate);

  if(!rec || rec.status !== "出席"){
    return;
  }
}
    let p=0,a=0,u=0;

    html += "<tr>";
    html += `<td class="name">${displayName}</td>`;

targetDates.forEach(date => {
      const rec = data.find(d => d.name === id && d.date === date);

      let mark = "";
const isActive = m.active !== false; // ←休部判定

if(rec){
  if(rec.status==="出席"){
    mark = "<span class='ok'>○</span>"; p++;
  }
  else if(rec.status==="欠席"){
    mark = "<span class='ng'>×</span>"; a++;
  }
  else{
    mark = "<span class='mid'>未</span>"; u++;
  }

}else{

  if(!isActive){
    mark = "<span class='none'>休</span>"; // ✅ 休部
  }else{
    mark = "<span class='none'>未</span>"; // ✅ 在籍は未のまま
  }

}


      html += `<td>${mark}</td>`;
    });

    const total = p+a+u;
    const rate = total ? Math.round((p/total)*100) : 0;

    html += `<td>${p}</td>`;
    html += `<td>${a}</td>`;
    html += `<td>${u}</td>`;
    html += `<td class="rate">${rate}%</td>`;

    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("table").innerHTML =
  `<div style="margin-bottom:20px;">${summaryHtml}</div>` + html;
}

window.changeMonth = function(month){
  currentMonth = month;
  renderTable(month);
  renderTitle(month);
};

window.filterDate = function(date){

  if(selectedDate === date){
    selectedDate = null;
  } else {
    selectedDate = date;
  }

  // ✅ これ追加（安全）
  const target = currentMonth || monthKeys[0];

  renderTable(target);
};

async function loadAll(){

  // 出欠
  data = [];
  const attSnap = await getDocs(collection(db, "attendance"));
  attSnap.forEach(d => {

  const item = d.data();

  if(!item.date) return;

  let formattedDate = "";

  if(typeof item.date === "string"){
    formattedDate = item.date.replaceAll("/", "-");

  }else if(item.date.toDate){
    formattedDate = item.date.toDate().toISOString().slice(0,10);

  }else{
    return;
  }

  data.push({
    ...item,
    date: formattedDate
  });
});

  // イベント
events = [];

const evSnap = await getDocs(collection(db, "events")); // ←これ追加！！！🔥

evSnap.forEach(d => {

  const data = d.data();

  // ✅ date無いの防ぐ
  if(!data.date){
    console.warn("date無しデータ:", data);
    return;
  }

  let formattedDate = "";

  if(typeof data.date === "string"){
    formattedDate = data.date.replaceAll("/", "-");

  }else if(data.date.toDate){
    formattedDate = data.date.toDate().toISOString().slice(0,10);

  }else{
    console.warn("日付不正:", data);
    return;
  }

  events.push({
    ...data,
    date: formattedDate
  });
});

// ✅ ここに移動！！🔥
window.events = events;

  // メンバー
  members = [];
const memSnap = await getDocs(collection(db, "members"));
memSnap.forEach(d => {
  members.push({
    id: d.id,
    ...d.data()
  });
});

// ✅ これ追加
members.sort((a, b) => a.number - b.number);

  init();
renderTabs();

if(targetDate){

  selectedDate = targetDate;

  renderAttendanceDetail(targetDate);

}
else if(monthKeys.length > 0){

  currentMonth = monthKeys[0];
  changeMonth(monthKeys[0]);

}
else{

  renderTable();

}
}

window.copyAttendanceNames = async function(){

  if(!selectedDate){
    alert("先に日付をクリックして選択してください");
    return;
  }

  const names = members
    .filter(m => {

      const rec = data.find(d =>
        d.name === m.name &&
        d.date === selectedDate
      );

      return rec && rec.status === "出席";
    })
    .map(m => m.name);

  const text = names.join("\n");

  try{
    await navigator.clipboard.writeText(text);

    alert(
      selectedDate +
      " の出席者をコピーしました\n\n" +
      names.join("、")
    );

  }catch(e){

    prompt(
      "コピーしてください",
      text
    );

  }
}

function renderAttendanceDetail(date){

  let html = `
  <table>
    <tr>
      <th>背番号</th>
      <th>選手名</th>
      <th>出欠</th>
      <th>一言</th>
      <th>更新時間</th>
    </tr>
  `;

  members.forEach(m => {

    const rec = data.find(d =>
      d.name === m.name &&
      d.date === date
    );

    if(!rec) return;

    let mark = rec.status;

    if(mark === "出席") mark = "○";
    if(mark === "欠席") mark = "×";
    if(mark === "未定") mark = "△";

    html += `
      <tr>
        <td>${m.number}</td>
        <td>${m.name}</td>
        <td>${mark}</td>
        <td>${rec.comment || rec.message || rec.note || ""}</td>
        <td>${rec.updatedAt || ""}</td>
      </tr>
    `;
  });

  html += "</table>";

  document.getElementById("title").innerText =
    `${date} 出欠一覧`;

  document.getElementById("tabs").style.display = "none";

  document.getElementById("table").innerHTML = html;
}

window.onload = function(){
  if(window.startApp){
    startApp();
  }
}

</script>

</body>
</html>
