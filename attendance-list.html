<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>出欠一覧</title>

<style>
body{
  background:#02142c;
  color:white;
  text-align:center;
  padding:20px;
}

/* テーブル */
table{
  table-layout:auto;
  border-collapse:collapse;
  margin:auto;
  width:95%;
  font-size:13px;
}

th, td{
  border:1px solid #555;
  padding:6px;
}

th{
  background:#0a1f3f;
  position:sticky;
  top:0;
}

/* 名前列固定 */
.name{
  position:sticky;
  left:0;
  background:#0a1f3f;
  width:180px;
  white-space:nowrap;
}

/* マーク */
.ok{ background:#00c853; color:white; }
.ng{ background:#d50000; color:white; }
.mid{ background:#ffd600; color:black; }
.none{ background:#333; color:#aaa; }

th small{
  color:#80d8ff;
}

#tabs button{
  background:#0a1f3f;
  color:white;
  border-radius:20px;
  padding:8px 15px;
  cursor:pointer;
}

#tabs button:hover{
  background:#ff9800;
  color:black;
}
</style>
</head>

<body>

<!-- 🔥 ログインチェック（admin ではなく loggedIn を使う） -->
<script>
  const loggedIn = localStorage.getItem("loggedIn") === "true";
  if (!loggedIn) {
    alert("ログインしてください");
    location.href = "index.html";
  }
</script>

<h2>📊 出欠一覧</h2>
<div id="title" style="margin:10px;font-size:18px;"></div>

<div class="header">
  <button onclick="location.href='member-only.html'" style="
    background:#666;color:white;padding:10px 15px;border-radius:20px;">
    ← 部員専用ページに戻る
  </button>

  <button onclick="location.href='attendance.html'" style="
    background:#00c853;color:white;padding:10px 15px;border-radius:20px;">
    出欠入力へ
  </button>
</div>

<div id="tabs"></div>
<div id="table"></div>

<!-- 🔥 Firebase 読み込み -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

// 🔥 module 外で使えるように window に公開
window.db = db;
window.collection = collection;
window.getDocs = getDocs;
</script>

<!-- 🔥 Firestore 操作・描画ロジック（module 外） -->
<script>
let data = [];
let events = [];
let members = [];
let dates = [];
let months = {};
let monthKeys = [];
let selectedDate = null;
let currentMonth = null;

function renderTitle(selectedMonth){
  if(!selectedMonth){
    document.getElementById("title").innerText = "予定なし";
    return;
  }
  const todayStr = new Date().toISOString().slice(0,10);
  const monthText = selectedMonth.replace("-", "/");
  document.getElementById("title").innerText =
    `${monthText} 出欠一覧（${todayStr} 現在）`;
}

function init(){
  dates = events.map(e => e.date).sort();

  months = {};
  events.forEach(e => {
    const key = e.date.slice(0,7);
    if(!months[key]) months[key] = [];
    months[key].push(e.date);
  });

  monthKeys = Object.keys(months).sort();
}

function renderTabs(){
  let html = "";
  monthKeys.forEach(m => {
    html += `
      <button onclick="changeMonth('${m}')">
        ${m.replace("-", "年")}月
      </button>
    `;
  });
  document.getElementById("tabs").innerHTML = html;
}

function renderTable(selectedMonth){
  const todayStr = new Date().toISOString().slice(0,10);
  let summaryHtml = "";

  let targetDates = selectedMonth ? months[selectedMonth] : dates;
  targetDates = targetDates
    .filter(d => d >= todayStr)
    .sort((a,b)=> new Date(a) - new Date(b));

  let html = "<table>";
  html += "<tr>";
  html += "<th class='name'>名前</th>";

  targetDates.forEach(date => {
    const ev = events.find(e => e.date === date);
    const disp = date.slice(5).replace("-", "/");

    let bgStyle = "";
    if(selectedDate === date){
      bgStyle = "style='background:#00e676;color:black;'";
    } else if(date === todayStr){
      bgStyle = "style='background:#ff9800;color:black;'";
    }

    let label = `<div>${disp}</div>`;
    if(ev) label += `<small>${ev.type}</small>`;

    html += `<th ${bgStyle} onclick="filterDate('${date}')" style="cursor:pointer;">${label}</th>`;
  });

  html += "<th>出席</th><th>欠席</th><th>未定</th><th>出席率</th>";
  html += "</tr>";

  members.forEach(m=>{
    const id = `#${m.number}`;
    const displayName = `#${m.number} ${m.name}`;

    if(selectedDate){
      const rec = data.find(d => d.name === id && d.date === selectedDate);
      if(!rec || rec.status !== "出席") return;
    }

    let p=0,a=0,u=0;

    html += "<tr>";
    html += `<td class="name">${displayName}</td>`;

    targetDates.forEach(date => {
      const rec = data.find(d => d.name === id && d.date === date);
      let mark = "";

      const isActive = m.active !== false;

      if(rec){
        if(rec.status==="出席"){ mark = "<span class='ok'>○</span>"; p++; }
        else if(rec.status==="欠席"){ mark = "<span class='ng'>×</span>"; a++; }
        else{ mark = "<span class='mid'>未</span>"; u++; }
      }else{
        mark = isActive ? "<span class='none'>未</span>" : "<span class='none'>休</span>";
      }

      html += `<td>${mark}</td>`;
    });

    const total = p+a+u;
    const rate = total ? Math.round((p/total)*100) : 0;

    html += `<td>${p}</td><td>${a}</td><td>${u}</td><td class="rate">${rate}%</td>`;
    html += "</tr>";
  });

  html += "</table>";

  document.getElementById("table").innerHTML =
    `<div style="margin-bottom:20px;">${summaryHtml}</div>` + html;
}

function changeMonth(month){
  currentMonth = month;
  renderTable(month);
  renderTitle(month);
}

function filterDate(date){
  selectedDate = (selectedDate === date) ? null : date;
  renderTable(currentMonth);
}

async function loadAll(){
  // 出欠
  data = [];
  const attSnap = await getDocs(collection(db, "attendance"));
  attSnap.forEach(d => data.push(d.data()));

  // イベント
  events = [];
  const evSnap = await getDocs(collection(db, "events"));
  evSnap.forEach(d => events.push(d.data()));

  // メンバー
  members = [];
  const memSnap = await getDocs(collection(db, "members"));
  memSnap.forEach(d => members.push(d.data()));

  init();
  renderTabs();
  if(monthKeys.length > 0){
    changeMonth(monthKeys[0]);
  }
}

loadAll();
</script>

</body>
</html>
