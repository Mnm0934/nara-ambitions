<style>
*{
  box-sizing:border-box;
}

body{
  margin:0;
  padding-top:140px;
  font-family:'Noto Sans JP', 'Oswald', sans-serif;
  background:#02142c;
  color:white;
}

/* ヘッダーそのまま使い回しOK */
header h1{
  color:#d6002a;
}

/* メイン */
main{
  padding:20px 10%;
}

/* タイトル */
h2{
  font-size:36px;
  border-left:5px solid #d6002a;
  padding-left:15px;
  margin-bottom:30px;
}

/* スケジュールカード */
.schedule{
  display:flex;
  flex-direction:column;
  gap:20px;
}

.match{
  background:#d6002a;
  padding:15px 20px;
  margin:0 auto;
  border-radius:5px;
  border:2px solid #fff;
  box-shadow:0 10px 30px rgba(0,0,0,0.6);
  min-height:180px;
  transition:0.3s;
  position:relative;  /* ←これ追加🔥 */
}

.match,
.next-match{
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}

.match,
.next-match{
  width:100%;
  max-width:700px;
}


.next-match{
  background:#d6002a;
  padding:15px 20px;
  margin:0 auto 40px;
  border-radius:5px;
  border:2px solid #fff;
  min-height:180px;
}

.next-match{
  box-shadow:
    0 20px 60px rgba(0,0,0,0.9),
    0 0 20px rgba(214,0,42,0.6);
}

.next-match p{
  margin:6px 0;
}

.next-match .date{
  color:#fff;
  font-size:18px;
  font-weight:700;
  letter-spacing:2px;
}

.next-match .category{
  background:#000;
  font-size:14px;
  padding:5px 12px;
}

.next-match .teams{
  font-size:28px;
  margin:5px 0;
}

.next-match .time{
  margin:10px 0;
}

.next-match .place{
  color:#eee;
  font-size:12px;
}

.match p{
  margin:6px 0;
}

.match .date{
  margin-top:30px;
  color:#fff;
  font-size:18px;
  font-weight:700;
  letter-spacing:2px;
}

.match .category{
  background:#000;
  font-size:14px;
  padding:5px 12px;
}

.match .teams{
  font-size:22px;
}

.match .place{
  font-size:12px;
  color:#eee;
}

.match .time{
  margin:6px 0;
}

.match:hover{
  transform:translateY(-5px);
  box-shadow:
    0 20px 60px rgba(0,0,0,0.8),
    0 0 20px rgba(214,0,42,0.5);
}


/* 日付 */
.date{
  font-size:14px;
  color:#d6002a;
  letter-spacing:2px;
}

/* 対戦 */
.teams{
  font-size:24px;
  font-weight:700;
  margin:10px 0;
  letter-spacing:2px;
}

/* 場所 */
.place{
  font-size:16px;
  color:#ccc;
}

/* 開始時間 */
.time{
  font-size:16px;
  font-weight:700;
  margin-top:5px;
  color:#fff;
  letter-spacing:1px;
}

.category{
  display:inline-block;
  background:#d6002a;
  color:white;
  padding:4px 10px;
  font-size:12px;
  border-radius:3px;
  margin:5px 0;
}

.title::after{
  content:"";
  position:absolute;
  bottom:0;
  left:0;
  width:100%;
  height:80px;
  background:linear-gradient(
    to bottom,
    rgba(0,0,0,0),
    rgba(0,0,0,0.8)
  );
}

/* 結果 */
.result{
  margin-top:10px;
  font-size:18px;
  color:#ffd700;
}

.win{
  color:#00ff88;
}

.lose{
  color:#ff4d4d;
}

header{
  position:fixed;
  top:0;
  left:0;
  width:100%;

  display:flex;
  flex-direction:column;
  align-items:center;

  padding:12px 0;
  background:#000;
  border-bottom:2px solid #d6002a;
  box-shadow:0 5px 20px rgba(0,0,0,0.8);

  z-index:999;
}

.nav{
  display:flex;
  gap:40px;
  margin-top:10px;
  background:rgba(0,0,0,0.3);
  backdrop-filter:blur(10px);

  padding:10px 20px;

  max-width:1200px;
  margin-left:auto;
  margin-right:auto;

  box-sizing:border-box;
  overflow-x:auto;
  flex-wrap:nowrap;
  justify-content:flex-start;
}

.nav::-webkit-scrollbar{
  display:none;
}

.nav a{
  color:white;
  text-decoration:none;
  font-size:22px;
  font-weight:500;
  letter-spacing:3px;
  position:relative;
  transition:0.3s;
  display:inline-block;
  padding:8px 15px;
  border-radius:5px;
  white-space:nowrap;
  font-size:clamp(14px, 2vw, 22px);
}

.nav a::after{
  content:"";
  position:absolute;
  bottom:-5px;
  left:50%;
  width:0;
  height:2px;
  background:#d6002a;
  transition:0.3s;
  transform:translateX(-50%);
}

.nav a:hover{
  color:#d6002a;
  background:rgba(214,0,42,0.2);
  transform:translateY(-2px);
}

.nav a:hover::after{
  width:100%;
}

.nav a.active{
  color:#d6002a;
  background:rgba(214,0,42,0.2);
}

.nav a.active::after{
  width:100%;
}

.title{
  position:relative;
  width:100%;
  height:120px;            /* ✅ 高さを固定（これが一番重要） */
  display:flex;
  justify-content:center;
  align-items:center;      /* ✅ 中央揃え */
  background:linear-gradient(
    to bottom,
    #02142c,
    #062452,
    #02142c
  );
  border-bottom:3px solid #d6002a;
  box-shadow:0 5px 20px rgba(0,0,0,0.6);
  overflow:hidden;
}


.title::before{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:60%;
  height:100%;
  background:linear-gradient(
    120deg,
    transparent,
    rgba(255,255,255,0.6),
    transparent
  );
  animation: shine 3s infinite;
}

@keyframes shine{
  0% { left:-100%; }
  50% { left:120%; }
  100% { left:120%; }
}

.title img{
  height:80px;       /* ✅ 固定 */
  width:auto;        /* ✅ 縦優先にする */
}

.vs{
  color:#000;
  background:#fff;
  padding:3px 10px;
  border-radius:20px;
  font-size:12px;
  font-weight:700;
}

.filter button.active{
  background:#d6002a;
  color:#fff;
}

.filter button:hover{
  background:#d6002a;
  color:#fff;
}

.filter{
  display:flex;
  justify-content:center;
  gap:10px;
}

.filter button{
  width:120px;
  padding:8px 0;
  font-size:14px;

  border-radius:5px;
  background:#eee;

  transition:0.3s;

footer{

body{

<script>

let currentFilter = "all";

let events = [];

async function loadEvents(){

  console.log("loadEvents開始");
  console.log(window.db);
  console.log(window.getDocs);
  console.log(window.collection);

  try{
    const snap = await window.getDocs(
  window.collection(window.db, "events")
);

    console.log("Firestore OK");

    events = [];

    snap.forEach(docSnap => {

  console.log(
    "取得データ",
    docSnap.id,
    docSnap.data()
  );

  events.push({
    id: docSnap.id,
    ...docSnap.data()
  });

});

    console.log(events);

  }catch(e){
    console.error("Firebaseエラー", e);
  }

  renderCalendar();
  renderSchedule();
  renderNext();
}

function renderNext(){

  const nextBox = document.getElementById("next-match");

  const today = new Date();
  today.setHours(0,0,0,0);

  let next = events
    .filter(e => e.public)
    .sort((a,b) => new Date(a.date) - new Date(b.date))
    .find(e => new Date(e.date) >= today);

  if(next){
    nextBox.innerHTML = `
      <p class="date">${next.date}</p>
      <p class="teams">
        奈良アンビションズ <span class="vs">vs</span> ${next.opponent || ""}
      </p>
      <p class="place">${next.place || ""}</p>
      <p class="time">${next.time || ""}</p>
    `;
  }
}


/* ===== カレンダー用日付 ===== */

/* ===== カレンダー ===== */
let currentYear = new Date().getFullYear();
let currentMonth = new Date().getMonth();

function renderCalendar(){

  const calendarEl = document.getElementById("calendar");
  const title = document.getElementById("calendar-title");

  calendarEl.innerHTML = "";

  title.textContent = `${currentYear}年${currentMonth+1}月`;

  const firstDay = new Date(currentYear, currentMonth, 1).getDay();
  const lastDate = new Date(currentYear, currentMonth + 1, 0).getDate();

  for(let i=0; i<firstDay; i++){
  calendarEl.innerHTML += `
    <div class="empty"></div>
  `;
}

  for(let d=1; d<=lastDate; d++){

    const fullDate = `${currentYear}-${String(currentMonth+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;

    let className = "day";

    const event = events.find(e => e.date === fullDate && e.public);

// ✅ マッチ日
if(event){
  className += " match-day";
}

if(event){

  let label = "📅予定";

  if(event.type === "公式戦" || event.type === "OP戦") label = "⚾試合";
  else if(event.type === "練習") label = "🏃練習";
  else if(event.type === "飲み会") label = "🍺飲み会";

  calendarEl.innerHTML += `
    <div
  class="${className}"
  onclick="goMatch('${fullDate}')">
  ${d}
  <span>${label}</span>
</div>
  `;

}else{

  calendarEl.innerHTML += `
    <div class="${className}">
      ${d}
    </div>
  `;
}
  }
}

function goMatch(date){

  const target =
    document.getElementById(`match-${date}`);

  if(!target) return;

  target.scrollIntoView({
    behavior:"smooth",
    block:"center"
  });

  target.classList.add("focus");

  setTimeout(()=>{
    target.classList.remove("focus");
  },1000);

}

/* ===== 月変更 ===== */
function changeMonth(step){
  currentMonth += step;

  if(currentMonth < 0){
    currentMonth = 11;
    currentYear--;
  }

  if(currentMonth > 11){
    currentMonth = 0;
    currentYear++;
  }

renderCalendar();
renderSchedule(); // ←これ追加
}	

function renderSchedule(){

  const box = document.getElementById("schedule-list");
  box.innerHTML = "";

  const today = new Date();
  today.setHours(0,0,0,0);

  // 日付順に並び替え
  const sorted = [...events].sort((a,b)=> new Date(a.date) - new Date(b.date));

  sorted.forEach(e => {

    if(!e.public) return;

const date = new Date(e.date);
  const isFinished = date < today;

  // ✅ フィルタ
  if(currentFilter === "official" && e.type !== "公式戦") return;
if(currentFilter === "practice" && e.type !== "OP戦" && e.type !== "練習") return;
  if(currentFilter === "finished" && !isFinished) return;
  if(currentFilter === "upcoming" && isFinished) return;

    let resultClass = "";
let matchClass = "";
let resultText = "";
let scoreHTML = "";     // ←追加🔥
let badgeHTML = "";     // ←追加🔥

if(e.result){

  // まずスコアは必ず出す
  scoreHTML = `<div class="score">${e.result}</div>`;

  if(e.result.includes("勝")){
    resultClass = "win";
    matchClass = "win-match";

    scoreHTML = `<div class="score win">${e.result}</div>`;
    badgeHTML = `<div class="badge">勝利！</div>`;

  }else if(e.result.includes("敗")){
    resultClass = "lose";
    matchClass = "lose-match";

    scoreHTML = `<div class="score lose">${e.result}</div>`;
  }
}

box.innerHTML += `
  <div
    id="match-${e.date}"
    class="match ${isFinished ? "finished" : ""} ${matchClass}">
    
    ${badgeHTML}

    <p class="date">${e.date}</p>

    <p class="teams">
      ${e.type} vs ${e.opponent || ""}
    </p>

    ${scoreHTML}

    <p class="place">${e.place || ""}</p>
    <p class="time">${e.time || ""}</p>
  
  </div>
`;
  });
}

function filterMatch(e, type){
  document.querySelectorAll(".filter button").forEach(btn=>{
    btn.classList.remove("active");
  });

  e.target.classList.add("active");

  currentFilter = type;

  renderSchedule();
}

  loadEvents();

function goMember(){

  const saved = localStorage.getItem("userLogin");

  if(saved){
    const user = JSON.parse(saved);

    if(Date.now() < user.expire){
      location.href = "member-only.html";
      return;
    }
  }

  const id = prompt("IDを入力してください");
  const pass = prompt("パスワードを入力してください");

  if(
    (id === "admin" && pass === "0725") ||
    (id === "nakano" && pass === "1996")
  ){
    const data = {
  id,
  expire: Date.now() + (30 * 60 * 1000)
};

    localStorage.setItem("userLogin", JSON.stringify(data));

    alert("ログイン成功");
    location.href = "member-only.html";

  }else{
    alert("IDまたはパスワードが違います");
  }
}

</script>

<script>
const header = document.querySelector("header");

/* ↓元のコード */
window.addEventListener("scroll", () => {

  if(window.scrollY > 100){
    header.classList.add("small");
  }else{
    header.classList.remove("small");
  }

});

const menuBtn = document.querySelector(".menu-btn");
const nav = document.querySelector(".nav");
const overlay = document.querySelector(".overlay");

// ✅ 開閉
menuBtn.addEventListener("click", () => {
  menuBtn.classList.toggle("active");
  nav.classList.toggle("open");

  if(nav.classList.contains("open")){
    document.body.style.overflow = "hidden";
    overlay.classList.add("active");
  }else{
    document.body.style.overflow = "auto";
    overlay.classList.remove("active");
  }
});

// ✅ ナビ押したら閉じる
document.querySelectorAll(".nav a").forEach(link => {
  link.addEventListener("click", () => {
    nav.classList.remove("open");
    menuBtn.classList.remove("active");
    document.body.style.overflow = "auto";
    overlay.classList.remove("active");
  });
});

// ✅ 外クリックで閉じる
overlay.addEventListener("click", () => {
  nav.classList.remove("open");
  menuBtn.classList.remove("active");
  document.body.style.overflow = "auto";
  overlay.classList.remove("active");
});

// ✅ PCサイズに戻ったらメニュー強制リセット
window.addEventListener("resize", () => {

  if(window.innerWidth > 1024){

    nav.classList.remove("open");
    menuBtn.classList.remove("active");
    overlay.classList.remove("active");
    document.body.style.overflow = "auto";

  }

});


</script>
