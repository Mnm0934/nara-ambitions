<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>成績一覧</title>

<style>
body{
  background:#02142c;
  color:white;
  text-align:center;
  font-family: "Segoe UI", "Meiryo", sans-serif;
}

/* ✅ Excel風 */
table{
  border-collapse: collapse;
  font-size:12px;
  margin:20px auto;

  width: max-content;
  min-width:100%;

  table-layout: fixed;  /* ←これに変更🔥 */
}

th, td{
  width: 60px;   /* ←全部統一 */
}

th{
  background:#1c2f4a;
  cursor:pointer;
  font-weight:bold;
  position: sticky;
  top: 0;
  background:#333;
  z-index: 3;
}

thead{
  position: sticky;
  top: 0;
  z-index: 3;
}


td,th{
  border:1px solid #999;
  padding:6px 4px;
  white-space:nowrap;
}

td{
  text-align:right;
}

td:nth-child(2), th:nth-child(2){
  text-align:left;
}

th,td{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
  text-align:center;
}

/* 名前だけ広く */
td:nth-child(2), th:nth-child(2){
  min-width:80px;
  text-align:left;
}

/* 背番号 */
td:nth-child(1), th:nth-child(1){
  width:40px;
}

/* 数値系は全部小さく */
td:not(:nth-child(2)){
  width:45px;
}

th{
  position: sticky;
  top: 0;
  background:#333;
  z-index: 2;
}

tr:nth-child(even){
  background:#0a2a4a;
}

/* ✅ 投手テーブルの名前だけ制限 */
#pitcherTable td:nth-child(2),
#pitcherTable th:nth-child(2){
  width: 80px;
}

</style>
</head>

<body>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

// ★ ここで window に登録（これより前に loadMembers を呼んではダメ）
window.db = db;
window.getDocs = getDocs;
window.collection = collection;
window.deleteDoc = deleteDoc;
window.doc = doc;

// ★★★ Firestore から members を読み込む（安全版）★★★
let members = [];

async function loadMembers(){
  const snap = await getDocs(collection(db, "members"));
  members = [];
  snap.forEach(docSnap => members.push(docSnap.data()));
}

// ★ getDocs を window に登録した “後” に呼ぶことが絶対条件
loadMembers();
</script>


  <button onclick="location.href='member-only.html'" style="
    background:#666;
    color:white;
    padding:10px 15px;
    border-radius:20px;
    cursor:pointer;">
  ← 部員専用ページに戻る</button>
<br>

<button onclick="goInput()">入力画面へ</button>
<br>

<div style="margin:10px;">
  <button onclick="changeMode('all')">通算</button>
  <button onclick="changeMode('year')">今年度</button>
  <button onclick="changeMode('recent')">直近5試合</button>
</div>


<h2>打者成績一覧</h2>
<div style="overflow:auto; max-height:500px;">
  <table id="batterTable"></table>
</div>

<h2>投手成績一覧</h2>
<div style="overflow:auto; max-height:400px;">
  <table id="pitcherTable"></table>
</div>

<h3>対象試合</h3>
<div id="gameList"></div>

<h2>ランキング</h2>
<div id="ranking"></div>

<button onclick="deleteBrokenData()">バグデータ削除</button>


<script>

// ✅ 打者ソート
let batterSortKey = "ops";
let batterSortOrder = "desc";

// ✅ 投手ソート
let pitcherSortKey = "era";
let pitcherSortOrder = "desc";

// ✅ 打者ソート変更
function changeBatterSort(key){
  if(batterSortKey === key){
    batterSortOrder = batterSortOrder === "desc" ? "asc" : "desc";
  }else{
    batterSortKey = key;
    batterSortOrder = "desc";
  }
  render();
}

// ✅ 投手ソート変更
function changePitcherSort(key){
  if(pitcherSortKey === key){
    pitcherSortOrder = pitcherSortOrder === "desc" ? "asc" : "desc";
  }else{
    pitcherSortKey = key;
    pitcherSortOrder = "desc";
  }
  render();
}

// ✅ 矢印表示
function sortArrow(key, currentKey, order){
  if(key !== currentKey) return "";
  return order === "desc" ? "▼" : "▲";
}

let resultsData = [];

async function loadResults(){

  const snap = await getDocs(collection(db, "results"));

  resultsData = [];

  snap.forEach(docSnap => {
    resultsData.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  render(); // ←これで表示
}

let mode = "all";

function changeSort(key){

  if(sortKey === key){
    sortOrder = sortOrder === "desc" ? "asc" : "desc";
  }else{
    sortKey = key;
    sortOrder = "desc";
  }

  render();
}

function goInput(){
  window.location.href = "game_input.html";
}

let members = JSON.parse(localStorage.getItem("members")) || [];

function getPlayers(){
  return members
    .sort((a,b)=>a.number - b.number)
    .map(m => ({
      num: m.number,
      name: m.name   // ←ココだけ変える
    }));
}

// ✅ ================= 打者 =================
function render(){

let rawData = resultsData
let data = [...rawData];

// ✅ ★これ追加（日付でソート）
data.sort((a,b)=>{
  return new Date(a.date) - new Date(b.date);
});

// ✅ モード処理
if(mode === "recent"){
  data = data.slice(-5);
}

if(mode === "year"){
  const thisYear = new Date().getFullYear();
  data = data.filter(g => g.date && g.date.startsWith(thisYear));
}


// ✅ ここ追加
const gameSet = new Set();

data.forEach(g=>{
  const label = `${g.date} ${g.game} vs ${g.opponent}`;
  gameSet.add(label);
});

  const table = document.getElementById("batterTable");

  table.innerHTML = `
<thead>
<tr>

<th onclick="changeBatterSort('num')">
  背番号 ${sortArrow('num', batterSortKey, batterSortOrder)}
</th>

<th>名前</th>
<th>試合</th>
<th>規定</th>

<th>打席</th>
<th>打数</th>
<th>安打</th>
<th>四死球</th>

<th>犠打</th>
<th>犠飛</th>
<th>三振</th>

<th>得点圏打数</th>
<th>得点圏安打</th>

<th>打点</th>
<th>盗塁</th>
<th>盗塁失敗</th>

<th>二塁打</th>
<th>三塁打</th>
<th>本塁打</th>
<th>塁打数</th>

<th onclick="changeBatterSort('avg')">
  打率 ${sortArrow('avg', batterSortKey, batterSortOrder)}
</th>

<th onclick="changeBatterSort('obp')">
  出塁率 ${sortArrow('obp', batterSortKey, batterSortOrder)}
</th>

<th>得点圏打率</th>

<th onclick="changeBatterSort('ops')">
  OPS ${sortArrow('ops', batterSortKey, batterSortOrder)}
</th>

</tr>
</thead>
<tbody id="batterBody"></tbody>
`;


const tbody = document.getElementById("batterBody");

  let list = [];
getPlayers()
.filter(p => {
  const cleanName = p.name.replace(/^#\d+\s*/, "");
const member = members.find(m => m.name === cleanName);
  return member && member.role === "選手";
})
.forEach(p=>{
  const num = p.num;
  const name = p.name;

  let games=0, pa=0, ab=0, hit=0, bb=0, rbi=0;
let sac=0, sf=0, so=0;
let sb=0, sb_fail=0;
let double=0, triple=0, hr=0, tb=0;
let risp_ab=0, risp_hit=0;

  data.forEach(game=>{

  let played = false;   // ✅ これ追加

  (game.batters || []).forEach(p=>{

    const cleanName = p.name.replace(/^#\d+\s*/, "");
    const member = members.find(m => m.name === cleanName);
    if(!member || member.role !== "選手") return;

    if(p.name.replace(/^#\d+\s*/, "") === name){

      played = true;   // ✅ これOK

      pa += p.pa||0;
      ab += p.ab||0;
      hit += p.hit||0;
      bb += p.bb||0;
      rbi += p.rbi||0;
      sb += p.sb||0;
      sb_fail += p.cs||0;
      double += p.double||0;
      triple += p.triple||0;
      hr += p.hr||0;
      sac += p.sac||0;
      sf += p.sf||0;
      so += p.so||0;
      risp_ab += p.risp_ab||0;
      risp_hit += p.risp_hit||0;

    }

  });

  // ✅ これ追加（超重要）
  if(played) games++;

});


  const avg = ab ? hit/ab : 0;
  const obp = (ab+bb+sf) ? (hit+bb)/(ab+bb+sf) : 0;
  const ops = avg + obp;

  const regulation = games * 3.1;
const isQualified = games > 0 && pa >= regulation;

list.push({
  num,name,
  games,
  pa,ab,hit,bb,rbi,
  sac,sf,so,
  risp_ab, risp_hit,
  sb,sb_fail,double,triple,hr,tb,
  avg,obp,ops,
  risp: risp_ab ? risp_hit/risp_ab : 0,
  isQualified
});


});

// ✅ ソート処理
list.sort((a,b)=>{
  if(batterSortOrder === "desc"){
    return b[batterSortKey] - a[batterSortKey];
  }else{
    return a[batterSortKey] - b[batterSortKey];
  }
});


// ✅ 表示
tbody.innerHTML = "";

list.forEach(p=>{
  tbody.innerHTML += `
  <tr>
    <td>${p.num}</td>
    <td>${p.name}</td>
<td>${p.games}</td>
<td>${p.isQualified ? "○" : "-"}</td>
    <td>${p.pa}</td>
<td>${p.ab}</td>
<td>${p.hit}</td>
<td>${p.bb}</td>

<td>${p.sac}</td>
<td>${p.sf}</td>
<td>${p.so}</td>

<td>${p.risp_ab || 0}</td>
<td>${p.risp_hit || 0}</td>

<td>${p.rbi}</td>
<td>${p.sb}</td>
<td>${p.sb_fail}</td>

<td>${p.double}</td>
<td>${p.triple}</td>
<td>${p.hr}</td>
<td>${p.tb}</td>

<td>${p.ab ? p.avg.toFixed(3) : "-"}</td>
<td>${p.ab ? p.obp.toFixed(3) : "-"}</td>
<td>${p.risp ? p.risp.toFixed(3) : "-"}</td>
<td>${p.ops ? p.ops.toFixed(3) : "-"}</td>
</tr>
  `;
});


// ✅ ★★★ここに入れる！！★★★
const gameList = document.getElementById("gameList");
gameList.innerHTML = Array.from(gameSet).map(g=>{
  return `<div onclick="editGame('${g}')"
    style="cursor:pointer; color:yellow;">
    ${g}
  </div>`;
}).join("");

renderPitcher();
}

function changeMode(newMode){
  mode = newMode;
  render();
}


// ✅ ================= 投手 =================
function renderPitcher(){

  let rawData = resultsData

let data = [...rawData];

// ✅ ★これ追加
data.sort((a,b)=>{
  return new Date(a.date) - new Date(b.date);
});

if(mode === "recent"){
  data = data.slice(-5);
}

if(mode === "year"){
  const thisYear = new Date().getFullYear();
  data = data.filter(g => g.date && g.date.startsWith(thisYear));
}

  const table = document.getElementById("pitcherTable");

  table.innerHTML = `
  <thead>
    <tr>
<th onclick="changePitcherSort('num')">
  背番号 ${sortArrow('num', pitcherSortKey, pitcherSortOrder)}
</th>

<th>名前</th>
<th>試合</th>
<th>規定</th>
<th>投球回</th>
<th>被安打</th>
<th>四球</th>
<th>三振</th>
<th>自責点</th>

<th onclick="changePitcherSort('era')">
  防御率 ${sortArrow('era', pitcherSortKey, pitcherSortOrder)}
</th>

<th>WHIP</th>
<th>K/BB</th>
    </tr>
  </thead>
  <tbody id="pitcherBody"></tbody>
  `;

  const tbody = document.getElementById("pitcherBody");

  let list = [];

  getPlayers()
.filter(p => {
  const cleanName = p.name.replace(/^#\d+\s*/, "");
const member = members.find(m => m.name === cleanName);
  return member && member.role === "選手";
})
.forEach(p=>{
  const num = p.num;
  const name = p.name;
let games = 0;
let inningOut = 0, hit=0, bb=0, so=0, er=0;

// ✅ ① まず全部の試合を集計
data.forEach(game=>{

  let played = false;

  (game.pitchers || []).forEach(row=>{
    if(row.name.replace(/^#\d+\s*/, "") === name){

      played = true;

      const ip = row.inning || 0;

      const whole = Math.floor(ip);
      const decimal = Number((ip - whole).toFixed(1));

      let outs = whole * 3;

      if(decimal === 0.1) outs += 1;
      if(decimal === 0.2) outs += 2;

      inningOut += outs;

      hit += row.hit || 0;
      bb += row.bb || 0;
      so += row.k || 0;
      er += row.er || 0;
    }
  });

  // ✅ これ追加（超重要）
  if(played) games++;

});


// ✅ ② 集計終わってから計算する
const displayInning =
  Math.floor(inningOut / 3) + "." + (inningOut % 3);

const realInning = inningOut / 3;
const isQualified = games > 0 && realInning >= games * 1.2;

// ✅ ③ 最後に1回だけ追加
list.push({
  num,
  name,
  games,
  isQualified,
  inning: displayInning,
  hit,
  bb,
  so,
  er,
  era: realInning ? er / realInning * 9 : 999,
  whip: realInning ? (hit + bb) / realInning : 999,
  kbb: bb ? so / bb : 0
});


});

list = list.filter(p => {
  const [whole, decimal] = p.inning.split(".");
  return Number(whole) > 0 || Number(decimal) > 0;
});

list.sort((a,b)=>{
  if(pitcherSortOrder === "desc"){
    return b[pitcherSortKey] - a[pitcherSortKey];
  }else{
    return a[pitcherSortKey] - b[pitcherSortKey];
  }
});

  // ✅ 表示
  tbody.innerHTML = "";

  list.forEach(p=>{
    tbody.innerHTML += `
    <tr>
      <td>${p.num}</td>
      <td>${p.name}</td>
<td>${p.games}</td>
<td>${p.isQualified ? "○" : "-"}</td>
      <td>${p.inning}</td>
      <td>${p.hit}</td>
      <td>${p.bb}</td>
      <td>${p.so}</td>
      <td>${p.er}</td>
      <td>${p.era !== 999 ? p.era.toFixed(2) : "-"}</td>
      <td>${p.whip !== 999 ? p.whip.toFixed(2) : "-"}</td>
      <td>${p.kbb ? p.kbb.toFixed(2) : "-"}</td>
    </tr>
    `;
  });

  makeRanking(data);
}

async function deleteBrokenData(){

  if(!confirm("日付なしデータ削除する？")) return;

  const snap = await getDocs(collection(db, "results"));

  for (const docSnap of snap.docs){

    const d = docSnap.data();

    if(!d.date || !d.game || !d.opponent){
      await deleteDoc(doc(db, "results", docSnap.id));
    }
  }

  alert("削除完了");
  loadResults();
}

function editGame(label){

  const parts = label.split(" vs ");
  const left = parts[0].split(" ");

  const date = left[0];
  const game = left.slice(1).join(" ");
  const opponent = parts[1];

  const match = resultsData.find(g =>
    g.date === date &&
    g.game === game &&
    g.opponent === opponent
  );

  localStorage.setItem("editGame", JSON.stringify(match));

  window.location.href = "game_input.html";
}

function makeRanking(data){

  const box = document.getElementById("ranking");

  let batterStats = {};
  let pitcherStats = {};
  let batterGames = {};   // ✅追加
  let pitcherGames = {};  // ✅追加

  data.forEach(game=>{

    // ✅ 打者
    (game.batters || []).forEach(p=>{

      const cleanName = p.name.replace(/^#\d+\s*/, "");
      const member = members.find(m => m.name === cleanName);
      if(!member || member.role !== "選手") return;

      if(!batterStats[cleanName]){
        batterStats[cleanName] = {pa:0, ab:0, hit:0};
        batterGames[cleanName] = new Set(); // ✅試合管理
      }

      batterStats[cleanName].pa += p.pa||0;
      batterStats[cleanName].ab += p.ab||0;
      batterStats[cleanName].hit += p.hit||0;

      // ✅ 試合カウント
      batterGames[cleanName].add(game.date + game.opponent);
    });

    // ✅ 投手
    (game.pitchers || []).forEach(p=>{

      const cleanName = p.name.replace(/^#\d+\s*/, "");
      const member = members.find(m => m.name === cleanName);
      if(!member || member.role !== "選手") return;

      if(!pitcherStats[cleanName]){
        pitcherStats[cleanName] = {inningOut:0, er:0};
        pitcherGames[cleanName] = new Set();
      }

      // ✅ 投球回
      const ip = p.inning || 0;
      const whole = Math.floor(ip);
      const decimal = Number((ip - whole).toFixed(1));

      let outs = whole * 3;
      if(decimal === 0.1) outs += 1;
      if(decimal === 0.2) outs += 2;

      pitcherStats[cleanName].inningOut += outs;
      pitcherStats[cleanName].er += p.er||0;

      pitcherGames[cleanName].add(game.date + game.opponent);
    });

  });

  // ✅ 打者ランキング（規定あり）
  const hitters = Object.keys(batterStats).map(name=>{
    const p = batterStats[name];
    const games = batterGames[name].size;
    const avg = p.ab ? p.hit/p.ab : 0;

    const regulation = games * 3.1;
    const isQualified = p.pa >= regulation;

    return {name, avg, isQualified};
  })
  .filter(p => p.isQualified)   // ✅これが本体！！！
  .sort((a,b)=>b.avg - a.avg);

  // ✅ 投手ランキング（規定あり）
  const pitchers = Object.keys(pitcherStats).map(name=>{
    const p = pitcherStats[name];
    const games = pitcherGames[name].size;

    const realInning = p.inningOut / 3;
    const era = realInning ? p.er / realInning * 9 : 999;

    const isQualified = realInning >= games * 1.2;

    return {name, era, isQualified};
  })
  .filter(p => p.isQualified)  // ✅これ！！
  .sort((a,b)=>a.era - b.era);

  // ✅ 表示
  let html = "<h3>打率ランキング（規定）</h3>";
  hitters.slice(0,5).forEach((p,i)=>{
    html += `${i+1}位 ${p.name} (${p.avg.toFixed(3)})<br>`;
  });

  html += "<h3>防御率ランキング（規定）</h3>";
  pitchers.slice(0,5).forEach((p,i)=>{
    html += `${i+1}位 ${p.name} (${p.era.toFixed(2)})<br>`;
  });

  box.innerHTML = html;
}
loadResults();
</script>

</body>
</html>
