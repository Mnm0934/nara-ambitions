<!-- ================= Firestore 初期化 ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

window.db = db;
window.getDocs = getDocs;
window.collection = collection;
window.deleteDoc = deleteDoc;
window.doc = doc;

window.members = [];

async function loadMembers(){
  const snap = await getDocs(collection(db, "members"));
  window.members = snap.docs.map(d => d.data());
}

// ★ これを追加するだけでOK
window.loadMembers = loadMembers;

<script>

function normalize(name){
  return (name || "")
    .replace(/^#\d+\s*/, "")
    .trim();
}

// ================= Firestore results 読み込み =================

let resultsData = [];
let eventsData = [];

async function loadEvents(){
  const snap = await window.getDocs(window.collection(window.db, "events"));

  eventsData = [];

  snap.forEach(docSnap => {
    eventsData.push({
      id: docSnap.id,
      ...docSnap.data()
    });
  });

  console.log("events:", eventsData); // 確認用
}


let batterSortKey = "num";
let batterSortOrder = "asc";

function changeBatterSort(key){
  if(batterSortKey === key){
    batterSortOrder = batterSortOrder === "asc" ? "desc" : "asc";
  }else{
    batterSortKey = key;
    batterSortOrder = "desc";
  }
  render();
}

function sortArrow(key, currentKey, order){
  if(key !== currentKey) return "";
  return order === "asc" ? "▲" : "▼";
}

async function loadResults(){
  const snap = await window.getDocs(window.collection(window.db, "results"));
  resultsData = [];

  snap.forEach(docSnap => {
    resultsData.push({
  firestoreId: docSnap.id,
  ...docSnap.data()
});
  });

  render();
}

let mode = "year";

function changeMode(m){
  mode = m;
  render();
}

function goInput(){
  window.location.href = "game_input.html";
}

// ================= players 取得 =================

function getPlayers(){
  return window.members
    .filter(m => m.role === "選手")
    .sort((a,b)=>a.number - b.number)
    .map(m => ({
      num: m.number,
      name: m.name
    }));
}

// ================= 打者集計（render 前半） =================

function render(){

  let rawData = resultsData;
  let data = [...rawData];

  // 日付ソート
  data.sort((a,b)=> new Date(a.date) - new Date(b.date));

  // モード処理
  if(mode === "recent") data = data.slice(-5);

  if(mode === "year"){
  const thisYear = new Date().getFullYear();

  data = data.filter(g => {
    if(!g.date) return false;
    return new Date(g.date).getFullYear() === thisYear;
  });
}

  // 対象試合一覧
  renderGameList(data);
renderTeamRecord(data);

  // ================= 打者テーブル =================

  const table = document.getElementById("batterTable");

  table.innerHTML = `
<thead>
<tr>
<th onclick="changeBatterSort('num')">背番号 ${sortArrow('num', batterSortKey, batterSortOrder)}</th>
<th>名前</th>
<th>試合</th>
<th>規定</th>
<th>打席</th>
<th>打数</th>
<th>安打</th>
<th>四死球</th>
<th>犠打</th>
<th>犠飛</th>
<th>三振</th>
<th>得点圏打数</th>
<th>得点圏安打</th>
<th>打点</th>
<th>得点</th>
<th>盗塁</th>
<th>盗塁失敗</th>
<th>二塁打</th>
<th>三塁打</th>
<th>本塁打</th>
<th>塁打数</th>
<th onclick="changeBatterSort('avg')">打率 ${sortArrow('avg', batterSortKey, batterSortOrder)}</th>
<th onclick="changeBatterSort('obp')">出塁率 ${sortArrow('obp', batterSortKey, batterSortOrder)}</th>
<th>得点圏打率</th>
<th onclick="changeBatterSort('ops')">OPS ${sortArrow('ops', batterSortKey, batterSortOrder)}</th>
</tr>
</thead>
<tbody id="batterBody"></tbody>
`;

  const tbody = document.getElementById("batterBody");

  let list = [];

  getPlayers().forEach(p=>{

    const num = p.num;
    const name = p.name;

    let games=0, pa=0, ab=0, hit=0, bb=0, rbi=0, run=0;
    let sac=0, sf=0, so=0;
    let sb=0, sb_fail=0;
    let double=0, triple=0, hr=0, tb=0;
    let risp_ab=0, risp_hit=0;

    data.forEach(game=>{
  let played = false;

  for(const row of (game.batters || [])){
    const cleanName = normalize(row.name);
    const member = window.members.find(m => normalize(m.name) === cleanName);

    if(!member || member.role !== "選手"){
      continue;
    }

    if(cleanName === normalize(name)){
      played = true;

      pa += row.pa||0;
      ab += row.ab||0;
      hit += row.hit||0;
      bb += row.bb||0;
      rbi += row.rbi||0;
run += row.run || 0;
      sb += row.sb||0;
      sb_fail += row.cs||0;

      double += row.double||0;
      triple += row.triple||0;
      hr += row.hr||0;

      const single = (row.hit||0)
        - (row.double||0)
        - (row.triple||0)
        - (row.hr||0);

      tb += single
        + (row.double||0)*2
        + (row.triple||0)*3
        + (row.hr||0)*4;

      sac += (row.sh || row.sac || 0);
      sf += row.sf||0;
      so += row.so||0;
      risp_ab += row.risp_ab||0;
      risp_hit += row.risp_hit||0;
    }
  }

  if(played) games++;
});

    const avg = ab ? Number(hit/ab) : 0;
const obp = (ab+bb+sf) ? Number((hit+bb)/(ab+bb+sf)) : 0;
const ops = avg + obp;

    const regulation = games * 3.0;

const isQualified =
  games >= data.length * 0.5 &&
  pa >= regulation;

    list.push({
  num,name,
  games,
  pa,ab,hit,bb,rbi,run,
      sac,sf,so,
      risp_ab, risp_hit,
      sb,sb_fail,double,triple,hr,tb,
      avg,obp,ops,
      risp: risp_ab ? risp_hit/risp_ab : 0,
      isQualified
    });
  });

  // ソート
  list.sort((a,b)=>{
  const A = Number(a[batterSortKey]) || 0;
  const B = Number(b[batterSortKey]) || 0;

  if(batterSortOrder === "desc"){
    return B - A;
  }else{
    return A - B;
  }
});


  // 表示
  tbody.innerHTML = "";
  list.forEach(p=>{
    tbody.innerHTML += `
    <tr>
      <td>${p.num}</td>
      <td>${p.name}</td>
      <td>${p.games}</td>
      <td>${p.isQualified ? "○" : "-"}</td>
      <td>${p.pa}</td>
      <td>${p.ab}</td>
      <td>${p.hit}</td>
      <td>${p.bb}</td>
      <td>${p.sac}</td>
      <td>${p.sf}</td>
      <td>${p.so}</td>
      <td>${p.risp_ab || 0}</td>
      <td>${p.risp_hit || 0}</td>
      <td>${p.rbi}</td>
<td>${p.run}</td>
<td>${p.sb}</td>
      <td>${p.sb_fail}</td>
      <td>${p.double}</td>
      <td>${p.triple}</td>
      <td>${p.hr}</td>
      <td>${p.tb}</td>
      <td>${p.ab ? p.avg.toFixed(3) : "-"}</td>
      <td>${p.ab ? p.obp.toFixed(3) : "-"}</td>
      <td>${p.risp ? p.risp.toFixed(3) : "-"}</td>
      <td>${p.ops ? p.ops.toFixed(3) : "-"}</td>
    </tr>
    `;
  });

  // 投手集計へ
  renderPitcher(data);
}
</script>

<!-- ここから投手集計・ランキング・対象試合一覧 -->
<script>

let pitcherSortKey = "era";
let pitcherSortOrder = "desc";

function changePitcherSort(key){
  if(pitcherSortKey === key){
    pitcherSortOrder = pitcherSortOrder === "desc" ? "asc" : "desc";
  }else{
    pitcherSortKey = key;
    pitcherSortOrder = "desc";
  }
  render();
}

function renderPitcher(data){

  const table = document.getElementById("pitcherTable");

  table.innerHTML = `
  <thead>
    <tr>
      <th onclick="changePitcherSort('num')">背番号 ${sortArrow('num', pitcherSortKey, pitcherSortOrder)}</th>
      <th>名前</th>
      <th>試合</th>
      <th>規定</th>
      <th>投球回</th>
      <th>被安打</th>
      <th>被本塁打</th>
      <th>四球</th>
      <th>三振</th>
      <th>自責点</th>
      <th onclick="changePitcherSort('era')">防御率 ${sortArrow('era', pitcherSortKey, pitcherSortOrder)}</th>
      <th>WHIP</th>
<th>K/BB</th>
<th onclick="changePitcherSort('k9')">
K/9 ${sortArrow('k9', pitcherSortKey, pitcherSortOrder)}
</th>

<th onclick="changePitcherSort('hr9')">
HR/9 ${sortArrow('hr9', pitcherSortKey, pitcherSortOrder)}
</th>

<th onclick="changePitcherSort('baa')">
被打率 ${sortArrow('baa', pitcherSortKey, pitcherSortOrder)}
</th>
    </tr>
  </thead>
  <tbody id="pitcherBody"></tbody>
  `;

  const tbody = document.getElementById("pitcherBody");

  let list = [];

  getPlayers().forEach(p=>{
    const num = p.num;
    const name = p.name;

    let games = 0;

let inningOut = 0;
let hit = 0;
let hr = 0;
let ab = 0;
let bb = 0;
let so = 0;
let er = 0;

    data.forEach(game=>{
  let played = false;

  (game.pitchers || []).forEach(row=>{
    if(normalize(row.name) === normalize(name)){

      played = true;

      const ip = row.inning || 0;
      const whole = Math.floor(ip);
      const decimal = Number((ip - whole).toFixed(1));

      let outs = whole * 3;
      if(decimal === 0.1) outs += 1;
      if(decimal === 0.2) outs += 2;

      inningOut += outs;
      hit += row.hit || 0;
hr += row.hr || 0;
ab += row.ab || 0;
bb += row.bb || 0;
so += row.k || 0;
er += row.er || 0;
    }
  });

  if(played) games++;
});

    const displayInning =
      Math.floor(inningOut / 3) + "." + (inningOut % 3);

    const realInning = inningOut / 3;
    const isQualified = games > 0 && realInning >= games * 1.2;

    list.push({
  num,
  name,
  games,
  isQualified,
  inning: displayInning,
  hit,
  hr,
  ab,
  bb,
  so,
  er,

  era: realInning ? er / realInning * 9 : 999,

  whip: realInning
    ? (hit + bb) / realInning
    : 999,

  kbb: bb
    ? so / bb
    : 0,

  k9: realInning
    ? so / realInning * 9
    : 0,

  hr9: realInning
    ? hr / realInning * 9
    : 0,

  baa: ab
    ? hit / ab
    : 0
});
  });

  // 投球回 0 の選手は除外
  list = list.filter(p => {
    const [whole, decimal] = p.inning.split(".");
    return Number(whole) > 0 || Number(decimal) > 0;
  });

  // ソート
  list.sort((a,b)=>{
    if(pitcherSortOrder === "desc"){
      return b[pitcherSortKey] - a[pitcherSortKey];
    }else{
      return a[pitcherSortKey] - b[pitcherSortKey];
    }
  });

  // 表示
  tbody.innerHTML = "";
  list.forEach(p=>{
    tbody.innerHTML += `
    <tr>
      <td>${p.num}</td>
      <td>${p.name}</td>
      <td>${p.games}</td>
      <td>${p.isQualified ? "○" : "-"}</td>
      <td>${p.inning}</td>
      <td>${p.hit}</td>
<td>${p.hr}</td>
<td>${p.bb}</td>
<td>${p.so}</td>
      <td>${p.er}</td>
      <td>${p.era !== 999 ? p.era.toFixed(2) : "-"}</td>
      <td>${p.whip !== 999 ? p.whip.toFixed(2) : "-"}</td>

<td>${p.kbb ? p.kbb.toFixed(2) : "-"}</td>

<td>${p.k9.toFixed(2)}</td>

<td>${p.hr9.toFixed(2)}</td>

<td>${p.ab ? p.baa.toFixed(3) : "-"}</td>
    </tr>
    `;
  });

  makeRanking(data);
}

// ================= 対象試合一覧 =================

function renderGameList(data){

  const gameList = document.getElementById("gameList");

  const displayData = [...data].reverse();

  gameList.innerHTML = displayData.map(g => {

    // ✅ 同じ日付の予定を探す
    const event = eventsData.find(e => e.date === g.date);

    // ✅ 予定があれば種類をつける（試合・練習など）
    const type = event ? `（${event.type}）` : "";


const myScore =
  (g.myInnings || []).reduce((a,b)=>a+(b||0),0);

const opScore =
  (g.opInnings || []).reduce((a,b)=>a+(b||0),0);

let result = "△";

if(myScore > opScore){
  result = "○";
}else if(myScore < opScore){
  result = "●";
}

    // ✅ 表示文字
    const label =
`${result} ${myScore}-${opScore}
 ${g.date} ${g.game}
 vs ${g.opponent} ${type}`;

    return `
      <div onclick="location.href='game_input.html?id=${g.firestoreId}'"
           style="
  cursor:pointer;
  margin:10px auto;
  padding:12px;
  border:1px solid #555;
  border-radius:10px;
  background:#0a2a4a;
  color:white;
  max-width:500px;
  text-align:left;
  box-shadow:0 2px 8px rgba(0,0,0,0.4);
">
        ${label}
      </div>
    `;
  }).join("");
}

function renderTeamRecord(data){

  let win = 0;
  let lose = 0;
  let draw = 0;

  let totalRun = 0;
  let totalLostRun = 0;

  let teamAb = 0;
  let teamHit = 0;

  let teamOuts = 0;
  let teamEr = 0;

  data.forEach(g=>{

    const my =
      (g.myInnings || [])
      .reduce((a,b)=>a+(b||0),0);

    const op =
      (g.opInnings || [])
      .reduce((a,b)=>a+(b||0),0);

  // 打率用
  (g.batters || []).forEach(b => {
    teamAb += b.ab || 0;
    teamHit += b.hit || 0;
  });

  // 防御率用
  (g.pitchers || []).forEach(p => {

    const ip = p.inning || 0;

    const whole = Math.floor(ip);
    const decimal = Number((ip - whole).toFixed(1));

    let outs = whole * 3;

    if(decimal === 0.1) outs += 1;
    if(decimal === 0.2) outs += 2;

    teamOuts += outs;
    teamEr += p.er || 0;
  });

    totalRun += my;
    totalLostRun += op;

    if(my > op){
      win++;
    }else if(my < op){
      lose++;
    }else{
      draw++;
    }

  });

  const games =
    win + lose + draw;

  const winRate =
    (win + lose)
    ? (win / (win + lose))
    : 0;

const teamAvg =
  teamAb
  ? teamHit / teamAb
  : 0;

const teamEra =
  teamOuts
  ? (teamEr / (teamOuts / 3)) * 9
  : 0;

  document.getElementById("teamRecord")
  .innerHTML = `
    試合数：${games}<br>
    ${win}勝 ${lose}敗 ${draw}分<br>
    勝率：${winRate.toFixed(3)}<br>
    得点：${totalRun}<br>
    失点：${totalLostRun}<br>
    チーム打率：${teamAvg.toFixed(3)}<br>
    チーム防御率：${teamEra.toFixed(2)}
  `;
}

// ================= ランキング =================

function makeRanking(data){

  const box = document.getElementById("ranking");

  let batterStats = {};
  let pitcherStats = {};
  let batterGames = {};
  let pitcherGames = {};

  data.forEach(game=>{

  // ---- 打者 ----
  for(const p of (game.batters || [])){
    const cleanName = p.name.replace(/^#\d+\s*/, "");
    const member = window.members.find(m => normalize(m.name) === normalize(cleanName));
    if(!member || member.role !== "選手"){
      continue;
    }

    if(!batterStats[cleanName]){
      batterStats[cleanName] = {
  pa:0,
  ab:0,
  hit:0,
  bb:0,
  sf:0,
  rbi:0,
  hr:0,
  sb:0
};
      batterGames[cleanName] = new Set();
    }

    batterStats[cleanName].pa += p.pa||0;
batterStats[cleanName].ab += p.ab||0;
batterStats[cleanName].hit += p.hit||0;
batterStats[cleanName].bb += p.bb||0;
batterStats[cleanName].sf += p.sf||0;
batterStats[cleanName].rbi += p.rbi||0;
batterStats[cleanName].hr += p.hr||0;
batterStats[cleanName].sb += p.sb||0;
    batterGames[cleanName].add(game.date + game.opponent);
  } // ✅ ← これを追加！！！！！！

  // ---- 投手 ----
  for(const p of (game.pitchers || [])){
    const cleanName = p.name.replace(/^#\d+\s*/, "");
    const member = window.members.find(m => normalize(m.name) === normalize(cleanName));
    if(!member || member.role !== "選手"){
      continue;
    }

    if(!pitcherStats[cleanName]){
  pitcherStats[cleanName] = {
  inningOut:0,
  er:0,
  hit:0,
  hr:0,
  bb:0,
  so:0
};
      pitcherGames[cleanName] = new Set();
    }

    const ip = p.inning || 0;
    const whole = Math.floor(ip);
    const decimal = Number((ip - whole).toFixed(1));

    let outs = whole * 3;
    if(decimal === 0.1) outs += 1;
    if(decimal === 0.2) outs += 2;

    pitcherStats[cleanName].inningOut += outs;
pitcherStats[cleanName].er += p.er||0;
pitcherStats[cleanName].hit += p.hit||0;
pitcherStats[cleanName].hr += p.hr||0;
pitcherStats[cleanName].bb += p.bb||0;
pitcherStats[cleanName].so += p.k||0;

    pitcherGames[cleanName].add(game.date + game.opponent);
  }

}); // ← これはそのままでOK

  // ---- 打率ランキング ----

  return {name, avg, isQualified};
})

  // ---- 防御率ランキング ----
  const pitchers = Object.keys(pitcherStats).map(name=>{
    const p = pitcherStats[name];
    const games = pitcherGames[name].size;

    const realInning = p.inningOut / 3;
    const era = realInning ? p.er / realInning * 9 : 999;

    const isQualified =
  games > 0 &&
  realInning >= games * 1.2;

    return {name, era, isQualified};
  })
  .filter(p => p.isQualified)
  .sort((a,b)=>a.era - b.era);

// ---- 奪三振ランキング ----
const soRank = Object.keys(pitcherStats)
.map(name=>{

  const games =
    pitcherGames[name].size;

    p.inningOut / 3;

  const qualified =
  games > 0 &&
  inning >= games * 1.2;

  return {
    name,
    so:p.so,
    qualified
  };

})
.filter(p => p.so > 0)
.sort((a,b)=>b.so-a.so);

// ---- WHIPランキング ----
const whipRank = Object.keys(pitcherStats)
.map(name=>{

  const p = pitcherStats[name];

  const games =
    pitcherGames[name].size;

  const inning =
    p.inningOut / 3;

  const qualified =
  games > 0 &&
  inning >= games * 1.2;

  return {
    name,
    whip: inning
      ? (p.hit + p.bb) / inning
      : 999,
    qualified
  };

})
.filter(p => p.qualified)
.sort((a,b)=>a.whip - b.whip);


// ---- OPSランキング ----
const opsRank = Object.keys(batterStats)
.map(name=>{

  const p = batterStats[name];

  const games =
    batterGames[name].size;

  const regulation =
    games * 3.0;

  const qualified =
    games >= data.length * 0.5 &&
    p.pa >= regulation;

  const avg =
    p.ab ? p.hit / p.ab : 0;

  const obp =
    (p.ab + p.bb + p.sf)
    ? (p.hit + p.bb) / (p.ab + p.bb + p.sf)
    : 0;

  return {
    name,
    ops: avg + obp,
    qualified
  };

})
.filter(p => p.qualified)
.sort((a,b)=>b.ops - a.ops);

// ---- K/BBランキング ----
const kbbRank = Object.keys(pitcherStats)
.map(name=>{

  const p = pitcherStats[name];

  const games =
    pitcherGames[name].size;

  const inning =
    p.inningOut / 3;

  const qualified =
  games > 0 &&
  inning >= games * 1.2;

  return {
    name,
    kbb: p.bb ? p.so / p.bb : null,
    qualified
  };

})
.filter(p => p.kbb !== null)
.filter(p => p.qualified)
.sort((a,b)=>b.kbb - a.kbb);


// ---- 本塁打ランキング ----
const hrRank = Object.keys(batterStats)
.map(name=>({
  name,
  hr:batterStats[name].hr
}))
.filter(p => p.hr > 0)
.sort((a,b)=>b.hr-a.hr);


// ---- 打点ランキング ----

.map(name=>({

}))
.filter(p => p.rbi > 0)
.sort((a,b)=>b.rbi-a.rbi);

// ---- 盗塁ランキング ----

function makeCard(title, list, formatter){

  html += `

      <div class="rank-title">${title}</div>
  `;

  let rank = 0;
let prevValue = null;

list.slice(0,5).forEach((p,i)=>{

  const value =
    Number(
      Object.values(p)
      .find(v => typeof v === "number")
    );

  if(i === 0){

    rank = 1;

  }else if(value !== prevValue){

    rank = i + 1;

  }

  prevValue = value;

  // 1位だけ特別表示
  if(rank === 1){

  html += `
  <div style="
    background:#ffd70022;
    border:1px solid #ffd70055;
    padding:8px;

    margin-bottom:8px;

  ">

  `;

  return;
}

  html += `

}

  </div>
  `;
});

  html += `</div>`;
}

// ================= バグデータ削除 =================

async function deleteBrokenData(){

  if(!confirm("日付なしデータ削除する？")) return;

  const snap = await window.getDocs(window.collection(window.db, "results"));

  for (const docSnap of snap.docs){
    const d = docSnap.data();
    if(!d.date || !d.game || !d.opponent){
      await window.deleteDoc(window.doc(window.db, "results", docSnap.id));
    }
  }

  alert("削除完了");
  loadResults();
}

      loadMembers().then(async () => {

});
    }

  }, 50);

});
