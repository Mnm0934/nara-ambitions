<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>成績一覧</title>

<style>
body{
  background:#02142c;
  color:white;
  text-align:center;
  font-family: "Segoe UI", "Meiryo", sans-serif;
}

table{
  border-collapse: collapse;
  font-size:12px;
  margin:20px auto;
  width: max-content;
  min-width:100%;
  table-layout: fixed;
}

th, td{
  width: 60px;
}

th{
  background:#333;
  cursor:pointer;
  font-weight:bold;
  position: sticky;
  top: 0;
  z-index: 3;
}

td,th{
  border:1px solid #999;
  padding:4px;
  white-space:nowrap;
  text-align:center;
}

td:nth-child(2), th:nth-child(2){
  min-width:80px;
  text-align:left;
}

td:nth-child(1), th:nth-child(1){
  width:40px;
}

td:not(:nth-child(2)){
  width:45px;
}

tr:nth-child(even){
  background:#0a2a4a;
}

#pitcherTable td:nth-child(2),
#pitcherTable th:nth-child(2){
  width: 80px;
}
</style>
</head>

<body>

<button onclick="location.href='member-only.html'" style="
  background:#666;
  color:white;
  padding:10px 15px;
  border-radius:20px;
  cursor:pointer;">
← 部員専用ページに戻る</button>
<br>

<button onclick="goInput()">入力画面へ</button>
<br>

<div style="margin:10px;">
  <button onclick="changeMode('all')">通算</button>
  <button onclick="changeMode('year')">今年度</button>
  <button onclick="changeMode('recent')">直近5試合</button>
</div>

<h2>打者成績一覧</h2>
<div style="overflow:auto; max-height:500px;">
  <table id="batterTable"></table>
</div>

<h2>投手成績一覧</h2>
<div style="overflow:auto; max-height:400px;">
  <table id="pitcherTable"></table>
</div>

<h3>対象試合</h3>
<div id="gameList"></div>

<h2>ランキング</h2>
<div id="ranking"></div>

<button onclick="deleteBrokenData()">バグデータ削除</button>

<!-- ================= Firestore 初期化 ================= -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import {
  getFirestore,
  collection,
  getDocs,
  deleteDoc,
  doc
} from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

const app = initializeApp({
  apiKey: "AIzaSyAiyyqdgn6RaS_6-GlGcZzkaebgFnTUh8U",
  authDomain: "nara-ambitions.firebaseapp.com",
  projectId: "nara-ambitions",
  storageBucket: "nara-ambitions.firebasestorage.app",
  messagingSenderId: "690491149380",
  appId: "1:690491149380:web:e854ec4df26cd98c474011"
});

const db = getFirestore(app);

window.db = db;
window.getDocs = getDocs;
window.collection = collection;
window.deleteDoc = deleteDoc;
window.doc = doc;

window.members = [];

async function loadMembers(){
  const snap = await getDocs(collection(db, "members"));
  window.members = snap.docs.map(d => d.data());
}

// ★ これを追加するだけでOK
window.loadMembers = loadMembers;

</script>

<script>

function normalize(name){
  return (name || "")
    .replace(/^#\d+\s*/, "")
    .trim();
}

// ================= Firestore results 読み込み =================

let resultsData = [];

let batterSortKey = "num";
let batterSortOrder = "asc";

function changeBatterSort(key){
  if(batterSortKey === key){
    batterSortOrder = batterSortOrder === "asc" ? "desc" : "asc";
  }else{
    batterSortKey = key;
    batterSortOrder = "desc";
  }
  render();
}

function sortArrow(key, currentKey, order){
  if(key !== currentKey) return "";
  return order === "asc" ? "▲" : "▼";
}

async function loadResults(){
  const snap = await window.getDocs(window.collection(window.db, "results"));
  resultsData = [];

  snap.forEach(docSnap => {
    resultsData.push({
  firestoreId: docSnap.id,
  ...docSnap.data()
});
  });

  render();
}

let mode = "all";

function changeMode(m){
  mode = m;
  render();
}

function goInput(){
  window.location.href = "game_input.html";
}

// ================= players 取得 =================

function getPlayers(){
  return window.members
    .filter(m => m.role === "選手")
    .sort((a,b)=>a.number - b.number)
    .map(m => ({
      num: m.number,
      name: m.name
    }));
}

// ================= 打者集計（render 前半） =================

function render(){

  let rawData = resultsData;
  let data = [...rawData];

  // 日付ソート
  data.sort((a,b)=> new Date(a.date) - new Date(b.date));

  // モード処理
  if(mode === "recent") data = data.slice(-5);

  if(mode === "year"){
  const thisYear = new Date().getFullYear();

  data = data.filter(g => {
    if(!g.date) return false;
    return new Date(g.date).getFullYear() === thisYear;
  });
}

  // 対象試合一覧
  renderGameList(data);

  // ================= 打者テーブル =================

  const table = document.getElementById("batterTable");

  table.innerHTML = `
<thead>
<tr>
<th onclick="changeBatterSort('num')">背番号 ${sortArrow('num', batterSortKey, batterSortOrder)}</th>
<th>名前</th>
<th>試合</th>
<th>規定</th>
<th>打席</th>
<th>打数</th>
<th>安打</th>
<th>四死球</th>
<th>犠打</th>
<th>犠飛</th>
<th>三振</th>
<th>得点圏打数</th>
<th>得点圏安打</th>
<th>打点</th>
<th>盗塁</th>
<th>盗塁失敗</th>
<th>二塁打</th>
<th>三塁打</th>
<th>本塁打</th>
<th>塁打数</th>
<th onclick="changeBatterSort('avg')">打率 ${sortArrow('avg', batterSortKey, batterSortOrder)}</th>
<th onclick="changeBatterSort('obp')">出塁率 ${sortArrow('obp', batterSortKey, batterSortOrder)}</th>
<th>得点圏打率</th>
<th onclick="changeBatterSort('ops')">OPS ${sortArrow('ops', batterSortKey, batterSortOrder)}</th>
</tr>
</thead>
<tbody id="batterBody"></tbody>
`;

  const tbody = document.getElementById("batterBody");

  let list = [];

  getPlayers().forEach(p=>{

    const num = p.num;
    const name = p.name;

    let games=0, pa=0, ab=0, hit=0, bb=0, rbi=0;
    let sac=0, sf=0, so=0;
    let sb=0, sb_fail=0;
    let double=0, triple=0, hr=0, tb=0;
    let risp_ab=0, risp_hit=0;

    data.forEach(game=>{
  let played = false;

  for(const row of (game.batters || [])){
    const cleanName = normalize(row.name);
    const member = window.members.find(m => normalize(m.name) === cleanName);

    if(!member || member.role !== "選手"){
      continue;
    }

    if(cleanName === normalize(name)){
      played = true;

      pa += row.pa||0;
      ab += row.ab||0;
      hit += row.hit||0;
      bb += row.bb||0;
      rbi += row.rbi||0;
      sb += row.sb||0;
      sb_fail += row.cs||0;

      double += row.double||0;
      triple += row.triple||0;
      hr += row.hr||0;

      const single = (row.hit||0)
        - (row.double||0)
        - (row.triple||0)
        - (row.hr||0);

      tb += single
        + (row.double||0)*2
        + (row.triple||0)*3
        + (row.hr||0)*4;

      sac += row.sac||0;
      sf += row.sf||0;
      so += row.so||0;
      risp_ab += row.risp_ab||0;
      risp_hit += row.risp_hit||0;
    }
  }

  if(played) games++;
});

    const avg = ab ? hit/ab : 0;
    const obp = (ab+bb+sf) ? (hit+bb)/(ab+bb+sf) : 0;
    const ops = avg + obp;

    const regulation = games * 3.1;
    const isQualified = games > 0 && pa >= regulation;

    list.push({
      num,name,
      games,
      pa,ab,hit,bb,rbi,
      sac,sf,so,
      risp_ab, risp_hit,
      sb,sb_fail,double,triple,hr,tb,
      avg,obp,ops,
      risp: risp_ab ? risp_hit/risp_ab : 0,
      isQualified
    });
  });

  // ソート
  list.sort((a,b)=>{
    if(batterSortOrder === "desc"){
      return b[batterSortKey] - a[batterSortKey];
    }else{
      return a[batterSortKey] - b[batterSortKey];
    }
  });

  // 表示
  tbody.innerHTML = "";
  list.forEach(p=>{
    tbody.innerHTML += `
    <tr>
      <td>${p.num}</td>
      <td>${p.name}</td>
      <td>${p.games}</td>
      <td>${p.isQualified ? "○" : "-"}</td>
      <td>${p.pa}</td>
      <td>${p.ab}</td>
      <td>${p.hit}</td>
      <td>${p.bb}</td>
      <td>${p.sac}</td>
      <td>${p.sf}</td>
      <td>${p.so}</td>
      <td>${p.risp_ab || 0}</td>
      <td>${p.risp_hit || 0}</td>
      <td>${p.rbi}</td>
      <td>${p.sb}</td>
      <td>${p.sb_fail}</td>
      <td>${p.double}</td>
      <td>${p.triple}</td>
      <td>${p.hr}</td>
      <td>${p.tb}</td>
      <td>${p.ab ? p.avg.toFixed(3) : "-"}</td>
      <td>${p.ab ? p.obp.toFixed(3) : "-"}</td>
      <td>${p.risp ? p.risp.toFixed(3) : "-"}</td>
      <td>${p.ops ? p.ops.toFixed(3) : "-"}</td>
    </tr>
    `;
  });

  // 投手集計へ
  renderPitcher(data);
}
</script>

<!-- ここから投手集計・ランキング・対象試合一覧 -->
<script>

let pitcherSortKey = "era";
let pitcherSortOrder = "desc";

function changePitcherSort(key){
  if(pitcherSortKey === key){
    pitcherSortOrder = pitcherSortOrder === "desc" ? "asc" : "desc";
  }else{
    pitcherSortKey = key;
    pitcherSortOrder = "desc";
  }
  render();
}

function renderPitcher(data){

  const table = document.getElementById("pitcherTable");

  table.innerHTML = `
  <thead>
    <tr>
      <th onclick="changePitcherSort('num')">背番号 ${sortArrow('num', pitcherSortKey, pitcherSortOrder)}</th>
      <th>名前</th>
      <th>試合</th>
      <th>規定</th>
      <th>投球回</th>
      <th>被安打</th>
      <th>四球</th>
      <th>三振</th>
      <th>自責点</th>
      <th onclick="changePitcherSort('era')">防御率 ${sortArrow('era', pitcherSortKey, pitcherSortOrder)}</th>
      <th>WHIP</th>
      <th>K/BB</th>
    </tr>
  </thead>
  <tbody id="pitcherBody"></tbody>
  `;

  const tbody = document.getElementById("pitcherBody");

  let list = [];

  getPlayers().forEach(p=>{
    const num = p.num;
    const name = p.name;

    let games = 0;
    let inningOut = 0, hit=0, bb=0, so=0, er=0;

    data.forEach(game=>{
  let played = false;

  (game.pitchers || []).forEach(row=>{
    if(normalize(row.name) === normalize(name)){

      played = true;

      const ip = row.inning || 0;
      const whole = Math.floor(ip);
      const decimal = Number((ip - whole).toFixed(1));

      let outs = whole * 3;
      if(decimal === 0.1) outs += 1;
      if(decimal === 0.2) outs += 2;

      inningOut += outs;
      hit += row.hit || 0;
      bb += row.bb || 0;
      so += row.k || 0;
      er += row.er || 0;
    }
  });

  if(played) games++;
});

    const displayInning =
      Math.floor(inningOut / 3) + "." + (inningOut % 3);

    const realInning = inningOut / 3;
    const isQualified = games > 0 && realInning >= games * 1.2;

    list.push({
      num,
      name,
      games,
      isQualified,
      inning: displayInning,
      hit,
      bb,
      so,
      er,
      era: realInning ? er / realInning * 9 : 999,
      whip: realInning ? (hit + bb) / realInning : 999,
      kbb: bb ? so / bb : 0
    });
  });

  // 投球回 0 の選手は除外
  list = list.filter(p => {
    const [whole, decimal] = p.inning.split(".");
    return Number(whole) > 0 || Number(decimal) > 0;
  });

  // ソート
  list.sort((a,b)=>{
    if(pitcherSortOrder === "desc"){
      return b[pitcherSortKey] - a[pitcherSortKey];
    }else{
      return a[pitcherSortKey] - b[pitcherSortKey];
    }
  });

  // 表示
  tbody.innerHTML = "";
  list.forEach(p=>{
    tbody.innerHTML += `
    <tr>
      <td>${p.num}</td>
      <td>${p.name}</td>
      <td>${p.games}</td>
      <td>${p.isQualified ? "○" : "-"}</td>
      <td>${p.inning}</td>
      <td>${p.hit}</td>
      <td>${p.bb}</td>
      <td>${p.so}</td>
      <td>${p.er}</td>
      <td>${p.era !== 999 ? p.era.toFixed(2) : "-"}</td>
      <td>${p.whip !== 999 ? p.whip.toFixed(2) : "-"}</td>
      <td>${p.kbb ? p.kbb.toFixed(2) : "-"}</td>
    </tr>
    `;
  });

  makeRanking(data);
}

// ================= 対象試合一覧 =================

function renderGameList(data){
  const gameList = document.getElementById("gameList");

  gameList.innerHTML = data.map(g=>{
    const label = `${g.date} ${g.game} vs ${g.opponent}`;
    return `
      <div onclick="location.href='game_input.html?id=${g.firestoreId}'"
           style="cursor:pointer; color:yellow; margin:5px 0;">
        ${label}
      </div>
    `;
  }).join("");
}

// ================= ランキング =================

function makeRanking(data){

  const box = document.getElementById("ranking");

  let batterStats = {};
  let pitcherStats = {};
  let batterGames = {};
  let pitcherGames = {};

  data.forEach(game=>{

    // ---- 打者 ----
    for(const p of (game.batters || [])){
      const cleanName = p.name.replace(/^#\d+\s*/, "");
      const member = window.members.find(m => normalize(m.name) === normalize(cleanName));
      if(!member || member.role !== "選手"){
  continue;
}

      if(!batterStats[cleanName]){
        batterStats[cleanName] = {pa:0, ab:0, hit:0};
        batterGames[cleanName] = new Set();
      }

      batterStats[cleanName].pa += p.pa||0;
      batterStats[cleanName].ab += p.ab||0;
      batterStats[cleanName].hit += p.hit||0;

      batterGames[cleanName].add(game.date + game.opponent);
    });

    // ---- 投手 ----
    for(const p of (game.pitchers || [])){
      const cleanName = p.name.replace(/^#\d+\s*/, "");
      const member = window.members.find(m => normalize(m.name) === normalize(cleanName));
      if(!member || member.role !== "選手"){
  continue;
}

      if(!pitcherStats[cleanName]){
        pitcherStats[cleanName] = {inningOut:0, er:0};
        pitcherGames[cleanName] = new Set();
      }

      const ip = p.inning || 0;
      const whole = Math.floor(ip);
      const decimal = Number((ip - whole).toFixed(1));

      let outs = whole * 3;
      if(decimal === 0.1) outs += 1;
      if(decimal === 0.2) outs += 2;

      pitcherStats[cleanName].inningOut += outs;
      pitcherStats[cleanName].er += p.er||0;

      pitcherGames[cleanName].add(game.date + game.opponent);
    });

  });

  // ---- 打率ランキング ----
  const hitters = Object.keys(batterStats).map(name=>{
    const p = batterStats[name];
    const games = batterGames[name].size;
    const avg = p.ab ? p.hit/p.ab : 0;

    const regulation = games * 3.1;
    const isQualified = p.pa >= regulation;

    return {name, avg, isQualified};
  })
  .filter(p => p.isQualified)
  .sort((a,b)=>b.avg - a.avg);

  // ---- 防御率ランキング ----
  const pitchers = Object.keys(pitcherStats).map(name=>{
    const p = pitcherStats[name];
    const games = pitcherGames[name].size;

    const realInning = p.inningOut / 3;
    const era = realInning ? p.er / realInning * 9 : 999;

    const isQualified = realInning >= games * 1.2;

    return {name, era, isQualified};
  })
  .filter(p => p.isQualified)
  .sort((a,b)=>a.era - b.era);

  // ---- 表示 ----
  let html = "<h3>打率ランキング（規定）</h3>";
  hitters.slice(0,5).forEach((p,i)=>{
    html += `${i+1}位 ${p.name} (${p.avg.toFixed(3)})<br>`;
  });

  html += "<h3>防御率ランキング（規定）</h3>";
  pitchers.slice(0,5).forEach((p,i)=>{
    html += `${i+1}位 ${p.name} (${p.era.toFixed(2)})<br>`;
  });

  box.innerHTML = html;
}

// ================= バグデータ削除 =================

async function deleteBrokenData(){

  if(!confirm("日付なしデータ削除する？")) return;

  const snap = await window.getDocs(window.collection(window.db, "results"));

  for (const docSnap of snap.docs){
    const d = docSnap.data();
    if(!d.date || !d.game || !d.opponent){
      await window.deleteDoc(window.doc(window.db, "results", docSnap.id));
    }
  }

  alert("削除完了");
  loadResults();
}

// ================= 初期ロード =================

window.addEventListener("load", () => {

  const wait = setInterval(() => {

    if (window.getDocs) {
      clearInterval(wait);

      // members → results の順で読み込む
      loadMembers().then(() => {
        loadResults();
      });
    }

  }, 50);

});
</script>

</body>
</html>
